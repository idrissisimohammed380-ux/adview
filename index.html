<style>
:root{--bg0:#080808;--bg1:#101010;--bg2:#181818;--bg3:#222;--bg4:#2a2a2a;--ac:#22c55e;--ac2:#16a34a;--acg:rgba(34,197,94,.16);--acd:rgba(34,197,94,.07);--t1:#f0fdf4;--t2:#9ca3af;--t3:#4b5563;--bd:#1c1c1c;--bd2:#272727;--sh:0 8px 48px rgba(0,0,0,.85);--r:14px}
.light{--bg0:#f0fdf4;--bg1:#fff;--bg2:#f1f8f2;--bg3:#e2f0e3;--bg4:#d0e9d1;--ac:#16a34a;--ac2:#15803d;--acg:rgba(22,163,74,.14);--acd:rgba(22,163,74,.06);--t1:#052e16;--t2:#4b5563;--t3:#9ca3af;--bd:#d1fae5;--bd2:#a7f3d0;--sh:0 4px 24px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg0);color:var(--t1);height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

#app{display:flex;height:100dvh;overflow:hidden}
#sidebar{width:320px;min-width:320px;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--bg1);transition:transform .25s}
#chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.empty-panel{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t3);background:var(--bg0)}

/* Sidebar header */
.s-hdr{padding:12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;background:var(--bg1)}
.s-hdr-title{flex:1;font-size:16px;font-weight:900;color:var(--t1)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--bg1)}
.tab{flex:1;padding:10px 4px;border:none;background:none;color:var(--t3);font-size:10px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}

/* Chat rows */
.chat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s;position:relative}
.chat-row:hover,.chat-row.active{background:var(--acd)}
.chat-row.active{border-left:3px solid var(--ac)}

/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;position:relative;user-select:none}
.av-online::after{content:'';position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:#22c55e;border-radius:50%;border:2px solid var(--bg1);box-shadow:0 0 4px #22c55e88}

/* Unread badge */
.unread-badge{min-width:18px;height:18px;background:var(--ac);color:#031a03;border-radius:9px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;font-family:'JetBrains Mono',monospace}

/* Input */
.inp{width:100%;padding:8px 12px;border-radius:12px;background:var(--bg2);border:1.5px solid var(--bd2);color:var(--t1);font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border .2s}
.inp:focus{border-color:var(--ac)}
.msg-input{flex:1;padding:9px 14px;border-radius:24px;background:var(--bg2);border:1.5px solid var(--bd2);color:var(--t1);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;resize:none;line-height:1.5;max-height:88px;transition:border .2s}
.msg-input:focus{border-color:var(--ac)}

/* Buttons */
.btn{padding:10px 20px;border-radius:12px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--ac);color:#031a03;width:100%}
.btn-primary:hover{background:var(--ac2)}
.ib{background:none;border:none;cursor:pointer;padding:7px;border-radius:10px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.ib:hover{background:var(--bg3);color:var(--ac)}
.send-btn{background:var(--ac);border:none;cursor:pointer;padding:9px 16px;border-radius:20px;color:#031a03;font-size:11px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .2s}

/* Messages */
.bubble{max-width:72%;padding:9px 13px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word;animation:popIn .2s ease}
.bubble.own{background:linear-gradient(135deg,#166534,#15803d);color:#f0fdf4;border-bottom-right-radius:4px}
.bubble.other{background:var(--bg2);color:var(--t1);border-bottom-left-radius:4px;border:1px solid var(--bd2)}
.bubble.you-msg{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#dbeafe;border-bottom-left-radius:4px}

/* Typing dots */
.typing-dot{display:inline-block;width:6px;height:6px;background:var(--t3);border-radius:50%;margin:0 1px;animation:dot 1.2s infinite}

/* Overlay & Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s}
.modal{background:var(--bg1);border:1px solid var(--bd2);border-radius:20px;padding:20px;width:min(360px,92vw);max-height:88vh;overflow-y:auto;box-shadow:var(--sh);animation:slideUp .25s}

/* Dropdown */
.dropdown{position:absolute;background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:4px;box-shadow:var(--sh);z-index:200;min-width:160px;animation:popIn .15s}
.ditem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:none;color:var(--t2);font-size:11px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.ditem:hover{background:var(--bg3);color:var(--t1)}
.ditem.danger{color:#f87171}
.ditem.danger:hover{background:rgba(248,113,113,.1)}

/* Reply bar */
.reply-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg1);border-top:1px solid var(--bd);flex-shrink:0}
.reply-line{width:3px;height:36px;background:var(--ac);border-radius:2px;flex-shrink:0}

/* Emoji button */
.emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px;transition:transform .1s;line-height:1}
.emoji-btn:hover{transform:scale(1.3)}

/* VIP badge */
.vip-badge{display:inline-flex;align-items:center;gap:2px;border-radius:6px;padding:1px 5px;font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;flex-shrink:0}

/* Lead tag */
.lead-tag{background:var(--acg);color:var(--ac);border:1px solid rgba(34,197,94,.3);border-radius:5px;padding:1px 5px;font-size:8px;font-weight:900;font-family:'JetBrains Mono',monospace}

/* Search result highlight */
.highlight{background:rgba(34,197,94,.3);border-radius:2px;padding:0 1px}

/* Online dot */
.status-dot{width:7px;height:7px;background:var(--ac);border-radius:50%;display:inline-block;box-shadow:0 0 4px #22c55e88}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:8px 18px;font-size:11px;font-weight:700;z-index:2000;display:none;align-items:center;gap:6px;box-shadow:var(--sh);animation:popIn .2s}

/* Mobile */
@media(max-width:700px){
  #sidebar{position:fixed;inset:0;z-index:100;width:100%!important;transform:translateX(0)}
  #sidebar.hidden{transform:translateX(-100%)}
  #chat-panel{width:100%;position:fixed;inset:0;z-index:50}
  .bubble{max-width:85%!important}
  .msg-input{font-size:16px!important}
}

/* ══════════════════════════════════════
   FIREBASE REST API
══════════════════════════════════════ */
(function(){
  var B="https://frostchat-whithout-number-default-rtdb.firebaseio.com",L={};
  function url(p){return B+"/"+p.replace(/^\/+/,"")+".json";}
  async function get(p){try{var r=await fetch(url(p));return r.ok?await r.json():null;}catch(e){return null;}}
  async function set(p,v){try{await fetch(url(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function upd(p,v){try{await fetch(url(p),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function del(p){try{await fetch(url(p),{method:"DELETE"});}catch(e){}}
  function listen(p,cb){
    if(!L[p]){L[p]={cbs:[],last:undefined,t:null};
      var poll=async function(){var d=await get(p),h=JSON.stringify(d);if(h!==L[p].last){L[p].last=h;L[p].cbs.forEach(function(f){f(d);});}};
      poll();L[p].t=setInterval(poll,2000);}
    L[p].cbs.push(cb);
    return function(){if(!L[p])return;L[p].cbs=L[p].cbs.filter(function(f){return f!==cb;});if(!L[p].cbs.length){clearInterval(L[p].t);delete L[p];}};}
  function ref(p){return{_path:p,
    set:function(v){return set(p,v);},update:function(v){return upd(p,v);},remove:function(){return del(p);},
    once:function(){return get(p).then(function(v){return{val:function(){return v;}};});},
    on:function(e,cb){listen(p,function(d){cb({val:function(){return d;}});});},
    off:function(){if(L[p]){clearInterval(L[p].t);delete L[p];}},
    onDisconnect:function(){return{set:function(v){window.addEventListener("beforeunload",function(){navigator.sendBeacon(url(p),JSON.stringify(v));});}};}
  };}
  get(".info").then(function(d){
    window.__fbConnected=d!==null;
    var b=document.getElementById("conn-badge");
    if(b)b.style.display=window.__fbConnected?"none":"flex";
    if(window.__appRender)window.__appRender();
  });
  window.__fb={DEMO_MODE:false,
    ref:function(db,p){return ref(p);},
    set:function(r,v){return r.set(v);},
    update:function(r,v){return r.update(v);},
    push:function(r,v){var k=Date.now()+"_"+Math.random().toString(36).slice(2,8);return ref(r._path+"/"+k).set(v).then(function(){return{key:k};});},
    onValue:function(r,cb){return listen(r._path,function(d){cb({val:function(){return d;}});});},
    off:function(r){r.off();},get:function(r){return r.once();},remove:function(r){return r.remove();},
    onDisconnect:function(r){return r.onDisconnect();},serverTimestamp:function(){return Date.now();},
    query:function(r){return r;},orderByChild:function(){return function(r){return r;};},limitToLast:function(){return function(r){return r;};}
  };
  window.__fbReady=true;
})();
</script>

/* ══════════════════════════════════════
   FIREBASE DB LAYER
══════════════════════════════════════ */
const MEM = {users:{},chats:{},messages:{},typing:{}};
const DB = {
  async setUser(name,data){
    if(!window.__fb||window.__fb.DEMO_MODE){MEM.users[name]={...data,lastSeen:Date.now()};return;}
    const {db,ref,set}=window.__fb;
    await set(ref(db,"users/"+name.replace(/[.#$[\]]/g,"_")),{...data,lastSeen:Date.now()});
  },
  onUsers(cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb(MEM.users);return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"users");
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  async sendMessage(chatId,msg){
    if(!window.__fb||window.__fb.DEMO_MODE){
      if(!MEM.messages[chatId])MEM.messages[chatId]={};
      MEM.messages[chatId][msg.id]=msg;
      if(DB._ml[chatId])DB._ml[chatId](MEM.messages[chatId]);
      return;
    }
    const {db,ref,set,update}=window.__fb;
    await set(ref(db,"messages/"+chatId+"/"+msg.id),msg);
    await update(ref(db,"chats/"+chatId),{lastMsg:msg.type==="voice"?"🎤 Voice":msg.text,lastFrom:msg.from,ts:msg.ts});
  },
  async updateMessage(chatId,msgId,updates){
    if(!window.__fb||window.__fb.DEMO_MODE){
      if(MEM.messages[chatId]&&MEM.messages[chatId][msgId])Object.assign(MEM.messages[chatId][msgId],updates);
      return;
    }
    const {db,ref,update}=window.__fb;
    await update(ref(db,"messages/"+chatId+"/"+msgId),updates);
  },
  onMessages(chatId,cb){
    if(!window.__fb||window.__fb.DEMO_MODE){
      DB._ml[chatId]=cb;cb(MEM.messages[chatId]||{});
      return()=>{delete DB._ml[chatId];};
    }
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"messages/"+chatId);
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  _ml:{},
  async getChat(chatId){
    if(!window.__fb||window.__fb.DEMO_MODE)return MEM.chats[chatId]||null;
    const {db,ref,get}=window.__fb;
    const snap=await get(ref(db,"chats/"+chatId));
    return snap.val();
  },
  async saveChat(chat){
    if(!window.__fb||window.__fb.DEMO_MODE){MEM.chats[chat.id]=chat;return;}
    const {db,ref,set}=window.__fb;
    await set(ref(db,"chats/"+chat.id),chat);
  },
  onChats(cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb(MEM.chats);return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"chats");
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  setTyping(chatId,name,on){
    if(!window.__fb||window.__fb.DEMO_MODE)return;
    const {db,ref,set}=window.__fb;
    set(ref(db,"typing/"+chatId+"/"+name.replace(/[.#$[\]]/g,"_")),on?Date.now():null);
  },
  onTyping(chatId,cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb({});return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"typing/"+chatId);
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  setupPresence(name){
    if(!window.__fb||window.__fb.DEMO_MODE)return;
    const {db,ref,set,onValue,onDisconnect}=window.__fb;
    const key=name.replace(/[.#$[\]]/g,"_");
    const userRef=ref(db,"users/"+key);
    const od=onDisconnect(userRef);
    if(od&&od.set)od.set({...S.user,online:false,lastSeen:Date.now()});
    onValue(ref(db,".info/connected"),snap=>{
      if(snap.val()===true)set(ref(db,"users/"+key),{...S.user,online:true,lastSeen:Date.now()});
    });
  }
};

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="text")el.textContent=v;

function timeFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
}
function dateFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return"Today";
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return"Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});

let _typingTimer;
function sendTypingIndicator(on){
  if(!S.user||!S.activeChat)return;
  clearTimeout(_typingTimer);
  DB.setTyping(S.activeChat.id,S.user.name,on);
  if(on)_typingTimer=setTimeout(()=>DB.setTyping(S.activeChat.id,S.user.name,false),4000);
}

async function doSend(){
  const ta=document.getElementById("chat-input");
  if(ta)S.input=ta.value||"";
  const text=S.input.trim();
  if(!text||!S.activeChat)return;
  const msg={id:uid(),from:S.user.name,text,ts:Date.now(),type:"text",
    replyTo:S.replyTo?{id:S.replyTo.id,from:S.replyTo.from,text:S.replyTo.text}:null,
    starred:false,reactions:{},deleted:false,edited:false};
  S.input="";if(ta){ta.value="";ta.style.height="auto";}
  S.replyTo=null;S.emojiOpen=false;
  const sb=document.getElementById("send-btn");
  if(sb){sb.style.background="var(--bg3)";sb.style.color="var(--t3)";}
  sendTypingIndicator(false);
  await DB.sendMessage(S.activeChat.id,msg);
}

async function commitEdit(){
  if(!S.editMsg||!S.activeChat)return;
  const text=S.editTxt.trim();
  if(!text)return;
  await DB.updateMessage(S.activeChat.id,S.editMsg.id,{text,edited:true});
  S.editMsg=null;S.editTxt="";render();
}

async function deleteMsg(msg){
  if(!S.activeChat)return;
  await DB.updateMessage(S.activeChat.id,msg.id,{deleted:true,text:"This message was deleted"});
  S.msgMenu=null;render();
}

async function toggleStar(msg){
  if(!S.activeChat)return;
  await DB.updateMessage(S.activeChat.id,msg.id,{starred:!msg.starred});
  S.msgMenu=null;render();
}

async function startDM(name){
  if(!S.user)return;
  const id=[S.user.name,name].sort().join("_dm_").replace(/[^a-zA-Z0-9_]/g,"");
  let chat=S.chats.find(c=>c.id===id);
  if(!chat){
    chat={id,name,type:"dm",members:[S.user.name,name],ts:Date.now(),lastMsg:"",lastFrom:""};
    await DB.saveChat(chat);
  }
  setActiveChat(chat);
  S.tab="chats";render();
}

function setActiveChat(c){
  S.activeChat=c;S.msgMenu=null;S.chatMenu=false;
  S.replyTo=null;S.input="";S.chatSearch=false;S.chatSearchQ="";
  S.emojiOpen=false;S.editMsg=null;

    const others=Object.entries(typingMap||{}).filter(([n,v])=>n!==S.user?.name&&v&&Date.now()-v<5000);
    S.botTyping=others.length>0;render();
  });
  render();

function togglePin(id){

  localStorage.setItem("fc_pinned",JSON.stringify(S.pinned));render();

  S.chatMenu=false;render();

let _recTimer;
function startRec(e){
  if(e)e.preventDefault();
  if(S.rec)return;
  S.rec=true;S.recSec=0;
  _recTimer=setInterval(()=>{S.recSec++;render();},1000);
  render();
}
async function stopRec(e){
  if(e)e.preventDefault();
  if(!S.rec)return;
  clearInterval(_recTimer);
  const secs=S.recSec;
  S.rec=false;S.recSec=0;
  if(secs<1){render();return;}
  const msg={id:uid(),from:S.user.name,text:secs+"s",ts:Date.now(),type:"voice",

  S.vipCode=code;S.vipInput="";S.vipError="";S.vipModal=false;

  localStorage.setItem("fc_user",JSON.stringify(S.user));
  DB.setUser(S.user.name,{...S.user,vipCode:code});
  showToast(T[S.lang].vipSuccess,"👑");render();

async function ensureYouChat(name){
  const youId=[name,YOU_NAME].sort().join("_dm_").replace(/[^a-zA-Z0-9_]/g,"");
  const existing=await DB.getChat(youId);
  if(!existing){
    const chat={id:youId,name:YOU_NAME,type:"dm",members:[name,YOU_NAME],
      ts:Date.now(),lastMsg:"📝 Your personal space",lastFrom:YOU_NAME};
    await DB.saveChat(chat);
    const welcome={id:uid(),from:YOU_NAME,
      text:"👋 Welcome to your personal space!\n\n📝 Use this to:\n• Save notes & ideas 💡\n• Store important links 🔗\n• Write reminders ⏰\n• Keep anything private 🔒\n\nOnly you can see this!",
      ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(youId,welcome);
  }
}

/* ── Single Message ── */
function renderMessage(m,chat){
  if(!m||!m.id||!S.user)return h("span",{});
  const own=m.from===S.user.name;
  const isYouChat=chat.name===YOU_NAME;
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"4px",animation:"popIn .2s ease",position:"relative"}});

  // System message
  if(m.type==="system"){
    const sm=h("div",{style:{textAlign:"center",padding:"4px 12px",margin:"4px auto",background:"var(--bg2)",borderRadius:"12px",fontSize:"9px",color:"var(--t3)",border:"1px solid var(--bd)"}},m.text);
    wrap.appendChild(sm);return wrap;
  }

  // Group sender name
  if(!own&&chat.type==="group"&&!isYouChat){
    const fr=h("div",{style:{fontSize:"9px",color:"var(--ac)",marginBottom:"2px",paddingLeft:"10px",fontWeight:"800",display:"flex",alignItems:"center",gap:"4px"}},m.from);
    const mv=vipBadge(S.users[m.from]?.vipCode,7);if(mv)fr.appendChild(mv);
    wrap.appendChild(fr);
  }

  // Message row
  const row=h("div",{style:{display:"flex",alignItems:"flex-end",gap:"6px",flexDirection:own?"row-reverse":"row",maxWidth:"80%"}});

  if(!own&&chat.type!=="dm")row.appendChild(av(m.from,22,{}));

  // Bubble
  let bubbleClass="bubble "+(own?"own":isYouChat?"you-msg":"other");
  const bubble=h("div",{className:bubbleClass});

  // Reply preview
  if(m.replyTo&&!m.deleted){
    const rp=h("div",{style:{background:"rgba(0,0,0,.2)",borderRadius:"8px",padding:"5px 8px",marginBottom:"6px",borderLeft:"2px solid "+(own?"rgba(255,255,255,.5)":"var(--ac)"),fontSize:"10px",cursor:"pointer"},onClick:()=>{
      const orig=document.getElementById("msg-"+m.replyTo.id);
      if(orig){orig.scrollIntoView({behavior:"smooth"});orig.style.animation="none";setTimeout(()=>orig.style.animation="",50);}
    }});
    rp.appendChild(h("div",{style:{fontWeight:"800",marginBottom:"2px",opacity:".8"}},m.replyTo.from));
    rp.appendChild(h("div",{style:{opacity:".7",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},m.replyTo.text?.slice(0,50)));
    bubble.appendChild(rp);
  }

  if(m.deleted){
    bubble.appendChild(h("span",{style:{opacity:".5",fontStyle:"italic",fontSize:"11px"}},"🚫 "+m.text));
  } else if(m.type==="voice"){
    const vr=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",minWidth:"160px"}});
    const pb=h("button",{style:{background:own?"rgba(255,255,255,.2)":"var(--acg)",border:"none",borderRadius:"50%",width:"32px",height:"32px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:"0"}});
    pb.appendChild(ico("mic",14,own?"#f0fdf4":"var(--ac)"));vr.appendChild(pb);
    const ww=h("div",{style:{flex:"1",display:"flex",flexDirection:"column",gap:"3px"}});
    const wave=h("div",{style:{display:"flex",gap:"2px",alignItems:"center",height:"22px"}});
    [3,5,9,6,10,7,5,9,6,4,8,5,9,6,10,5,7,4].forEach(hh=>{
      wave.appendChild(h("div",{style:{width:"2px",height:hh+"px",background:own?"rgba(255,255,255,.5)":"var(--ac)",borderRadius:"1px",opacity:".7"}}));
    });
    ww.appendChild(wave);
    ww.appendChild(h("span",{style:{fontSize:"9px",color:own?"rgba(255,255,255,.6)":"var(--t3)",fontFamily:"JetBrains Mono,monospace"}},"🎤 "+m.text));
    vr.appendChild(ww);bubble.appendChild(vr);
  } else {
    const txt=h("div",{style:{whiteSpace:"pre-wrap",lineHeight:"1.5",fontSize:"13px"}},m.deleted?"🚫 deleted":m.text);
    if(S.chatSearchQ&&m.text){
      const rx=new RegExp("("+S.chatSearchQ.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
      txt.innerHTML=m.text.replace(rx,'<span class="highlight">$1</span>');
    }
    bubble.appendChild(txt);
    if(m.edited&&!m.deleted)bubble.appendChild(h("span",{style:{fontSize:"9px",opacity:".5",marginLeft:"6px"}},"(edited)"));
  }

  // Reactions
  if(m.reactions&&Object.keys(m.reactions).length){
    const rr=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"3px",marginTop:"4px"}});
    const rmap={};
    Object.entries(m.reactions).forEach(([user,emoji])=>{rmap[emoji]=(rmap[emoji]||[]);rmap[emoji].push(user);});
    Object.entries(rmap).forEach(([emoji,users])=>{
      const rb=h("button",{style:{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:"10px",padding:"2px 7px",cursor:"pointer",fontSize:"12px",display:"flex",alignItems:"center",gap:"3px"},onClick:()=>{
        if(!S.activeChat)return;
        const newR={...(m.reactions||{})};
        if(newR[S.user.name]===emoji)delete newR[S.user.name];else newR[S.user.name]=emoji;
        DB.updateMessage(S.activeChat.id,m.id,{reactions:newR});
      }});
      rb.appendChild(document.createTextNode(emoji));
      if(users.length>1)rb.appendChild(h("span",{style:{fontSize:"9px",opacity:".7"}},users.length));
      rr.appendChild(rb);
    });
    bubble.appendChild(rr);
  }

  // Time + ticks
  const tl=h("div",{style:{display:"flex",alignItems:"center",gap:"3px",marginTop:"4px",justifyContent:"flex-end"}});
  tl.appendChild(h("span",{style:{fontSize:"9px",opacity:".55",fontFamily:"JetBrains Mono,monospace"}},timeFmt(m.ts)));
  if(own&&!m.deleted){
    const tick=h("span",{style:{fontSize:"9px",color:m._read?"#22c55e":m._delivered?"rgba(255,255,255,.5)":"rgba(255,255,255,.3)"}},"✓"+(m._delivered||m._read?"✓":""));
    tl.appendChild(tick);
  }
  bubble.appendChild(tl);

  row.appendChild(bubble);
  row.id="msg-"+m.id;

  // Quick reactions
  const qr=h("div",{style:{display:S.msgMenu===m.id?"flex":"none",gap:"3px",marginBottom:"2px",flexDirection:own?"row":"row-reverse"}});
  ["❤️","👍","😂","😮","😢","🔥"].forEach(em=>{
    const rb=h("button",{style:{background:"var(--bg2)",border:"1px solid var(--bd2)",borderRadius:"50%",width:"28px",height:"28px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},onClick:e=>{
      e.stopPropagation();
      if(!S.activeChat)return;
      const newR={...(m.reactions||{})};
      newR[S.user.name]=em;
      DB.updateMessage(S.activeChat.id,m.id,{reactions:newR});
      S.msgMenu=null;render();
    }});
    rb.appendChild(document.createTextNode(em));qr.appendChild(rb);
  });
  wrap.appendChild(qr);
  wrap.appendChild(row);

  // Message menu
  if(S.msgMenu===m.id){
    const t2=T[S.lang];
    const menu=h("div",{className:"dropdown",style:{[own?"right":"left"]:"0",bottom:"100%",marginBottom:"4px"}});
    const menuItems=[
      {ic:"reply",lb:t2.replyTo,fn:()=>{S.replyTo=m;S.msgMenu=null;render();}},
      {ic:"copy",lb:t2.copy,fn:()=>{navigator.clipboard?.writeText(m.text);S.msgMenu=null;showToast("Copied!","📋");render();}},
      {ic:"star",lb:m.starred?t2.unstar:t2.star,fn:()=>toggleStar(m)},
      {ic:"forward",lb:t2.forward,fn:()=>{S.forwardMsg=m;S.msgMenu=null;render();}},
    ];
    if(own&&!m.deleted){
      menuItems.push({ic:"edit",lb:t2.edit,fn:()=>{S.editMsg=m;S.editTxt=m.text;S.msgMenu=null;render();}});
      menuItems.push({ic:"trash",lb:t2.delete,fn:()=>deleteMsg(m),danger:true});
    }
    menuItems.forEach(item=>{
      const btn=h("button",{className:"ditem"+(item.danger?" danger":""),onClick:item.fn});
      btn.appendChild(ico(item.ic,12,item.danger?"#f87171":"var(--t3)"));
      btn.appendChild(document.createTextNode(" "+item.lb));
      menu.appendChild(btn);
    });
    wrap.appendChild(menu);
  }

  // Long press / click for menu
  let pressTimer;
  row.addEventListener("contextmenu",e=>{e.preventDefault();S.msgMenu=S.msgMenu===m.id?null:m.id;render();});
  row.addEventListener("touchstart",()=>{pressTimer=setTimeout(()=>{S.msgMenu=S.msgMenu===m.id?null:m.id;render();},500);},{passive:true});
  row.addEventListener("touchend",()=>clearTimeout(pressTimer),{passive:true});
  row.addEventListener("dblclick",()=>{S.msgMenu=S.msgMenu===m.id?null:m.id;render();});

  return wrap;
}

  const inp=h("input",{className:"inp",type:"text",placeholder:t.vipEnter,value:S.vipInput,style:{marginBottom:"8px",textAlign:"center",letterSpacing:"3px",fontWeight:"800",textTransform:"uppercase",fontSize:"14px"}});
  inp.addEventListener("input",e=>{S.vipInput=e.target.value.toUpperCase();S.vipError="";});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")activateVIP();});
  modal.appendChild(inp);
  setTimeout(()=>inp.focus(),50);

  if(S.vipError)modal.appendChild(h("div",{style:{color:"#f87171",fontSize:"11px",textAlign:"center",marginBottom:"8px",fontWeight:"700"}},"❌ "+S.vipError));

  const ab=h("button",{className:"btn btn-primary",style:{background:"linear-gradient(135deg,#f59e0b,#d97706)"},onClick:activateVIP},"✨ "+t.vipActivate);
  modal.appendChild(ab);
  const cb=h("button",{style:{width:"100%",marginTop:"8px",padding:"9px",borderRadius:"12px",background:"transparent",border:"1px solid var(--bd2)",color:"var(--t3)",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"11px",fontWeight:"700"},onClick:()=>{S.vipModal=false;S.vipError="";render();}},t.cancel);
  modal.appendChild(cb);ov.appendChild(modal);return ov;
}

/* ── Call Screen ── */
function renderCallScreen(){
  const c=S.callScreen;const t=T[S.lang];
  const ov=h("div",{style:{position:"fixed",inset:"0",background:"linear-gradient(135deg,#0a1a0a,#001a00)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px",zIndex:"2000",animation:"fadeIn .3s"}});
  ov.appendChild(av(c.name,80,{}));
  ov.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"900",color:"var(--t1)"}},c.name));
  ov.appendChild(h("div",{style:{fontSize:"12px",color:"var(--t3)",fontFamily:"JetBrains Mono,monospace"}},c.type==="video"?"Video calling...":"Calling..."));
  const endBtn=h("button",{style:{background:"#ef4444",border:"none",borderRadius:"50%",width:"60px",height:"60px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:"20px",boxShadow:"0 0 20px rgba(239,68,68,.4)"},onClick:()=>{S.callScreen=null;render();}});
  endBtn.appendChild(ico("phone",24,"#fff"));ov.appendChild(endBtn);
  ov.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)"}},"Tap to end call"));
  return ov;
}

/* ── Forward Modal ── */
function renderForwardModal(){
  const t=T[S.lang];
  const ov=h("div",{className:"overlay",onClick:()=>{S.forwardMsg=null;render();}});
  const modal=h("div",{className:"modal",onClick:e=>e.stopPropagation()});
  modal.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"900",marginBottom:"12px"}},t.forward));
  const preview=h("div",{style:{background:"var(--bg2)",borderRadius:"10px",padding:"10px",marginBottom:"12px",fontSize:"11px",color:"var(--t2)",borderLeft:"3px solid var(--ac)"}},S.forwardMsg?.text?.slice(0,80)+(S.forwardMsg?.text?.length>80?"...":""));
  modal.appendChild(preview);
  S.chats.filter(c=>c.id!==S.activeChat?.id).forEach(c=>{
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px",borderRadius:"10px",cursor:"pointer",marginBottom:"4px"},onClick:async()=>{
      const msg={id:uid(),from:S.user.name,text:"↩️ "+S.forwardMsg.text,ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
      await DB.sendMessage(c.id,msg);
      S.forwardMsg=null;showToast("Forwarded!","↩️");render();
    }});
    row.style.background="var(--bg2)";
    row.appendChild(av(c.name,32,{}));
    row.appendChild(h("span",{style:{fontSize:"12px",fontWeight:"700",color:"var(--t1)"}},c.name));
    modal.appendChild(row);
  });
  const cb=h("button",{style:{width:"100%",marginTop:"8px",padding:"9px",borderRadius:"12px",background:"var(--bg3)",border:"1px solid var(--bd2)",color:"var(--t3)",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:"11px",fontWeight:"700"},onClick:()=>{S.forwardMsg=null;render();}},t.cancel);
  modal.appendChild(cb);ov.appendChild(modal);return ov;
}

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
function boot(){
  window.__appRender=render;
  render();
  if(!S.user)return;
  const name=S.user.name;
  DB.setUser(name,{...S.user,online:true,lastSeen:Date.now()});
  DB.setupPresence(name);
  UNSUB.users=DB.onUsers(u=>{
    S.users=u||{};
    if(!S.users[YOU_NAME])S.users[YOU_NAME]={name:YOU_NAME,online:true,status:"Your personal space 📝",vipCode:""};
    render();
  });
  UNSUB.chats=DB.onChats(c=>{
    const myChats=Object.values(c||{}).filter(ch=>ch?.members?.includes(name));
    S.chats=myChats;
    myChats.forEach(ch=>{
      if(!UNSUB["msgs_"+ch.id]){
        UNSUB["msgs_"+ch.id]=DB.onMessages(ch.id,msgsMap=>{
          if(msgsMap&&Object.keys(msgsMap).length>0){
            const prev=Object.values(S.messages[ch.id]||{}).length;
            const curr=Object.values(msgsMap).length;
            if(curr>prev){
              const newMsg=Object.values(msgsMap).sort((a,b)=>a.ts-b.ts).pop();
              if(newMsg&&newMsg.from!==name&&S.activeChat?.id!==ch.id){
                S.unread={...S.unread,[ch.id]:(S.unread[ch.id]||0)+1};
                pushNotif(newMsg.from,newMsg.text);
              }
            }
            S.messages={...S.messages,[ch.id]:msgsMap};
          }
          render();
        });
      }
    });
    render();
  });
}

window.__appRender=render;
boot();
</script>
