/* ─── RICH TEXT ─── */
function renderRichText(text,own){
  const el=h("div",{style:{whiteSpace:"pre-wrap",lineHeight:"1.55",fontSize:"13px",wordBreak:"break-word"}});
  if(!text){return el;}

  // code block ```
  if(text.includes("```")){
    const parts=text.split("```");
    parts.forEach((p,i)=>{
      if(i%2===1){el.appendChild(h("div",{className:"code-block"},p.trim()));}
      else if(p.trim()){
        const s=document.createElement("span");
        s.textContent=p;
        el.appendChild(s);
      }
    });
    return el;
  }

  // inline formatting
  let safe=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  safe=safe
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/_(.+?)_/g,"<em>$1</em>")
    .replace(/`([^`]+)`/g,'<span style="font-family:JetBrains Mono,monospace;background:rgba(0,0,0,.35);padding:1px 5px;border-radius:4px;font-size:11px">$1</span>')
    .replace(/@(\w+)/g,'<span class="mention" onclick="startDM(\'$1\')">@$1</span>');
  el.innerHTML=safe;

  // Link preview (skip forwarded/location msgs)
  const url=extractURL(text);
  if(url && !text.startsWith("↩️") && !text.startsWith("📍")){
    el.appendChild(renderLinkPreview(url));
  }
  return el;
}

/* ─── SWIPE TO REPLY ─── */
function attachSwipeReply(rowEl, msg){
  let sx=0,dx=0;
  const threshold=55;
  rowEl.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;dx=0;},{passive:true});
  rowEl.addEventListener("touchmove",e=>{
    dx=e.touches[0].clientX-sx;
    const capped=Math.max(0,Math.min(dx*0.55,44));
    if(dx>10) rowEl.style.transform="translateX("+capped+"px)";
  },{passive:true});
  rowEl.addEventListener("touchend",()=>{
    rowEl.style.transform="";
    rowEl.style.transition="transform .2s";
    if(dx>threshold){
      S.replyTo=msg;
      showToast("Replying to "+msg.from,"↩️");
      render();
    }
    setTimeout(()=>{rowEl.style.transition="";},250);
  },{passive:true});
}

const GAME_DB_PATH = "games"; // Firebase path for games

/* ─── إرسال دعوة للعب ─── */
async function sendGameInvite(gameType, chatId, opponent){
  const gameId = uid();
  const gameData = {
    id: gameId,
    type: gameType,
    chatId: chatId,
    host: S.user.name,
    guest: opponent,
    status: "pending", // pending | accepted | declined | playing | finished
    board: gameType === "tictactoe" ? Array(9).fill(null) : null,
    turn: S.user.name, // host goes first
    winner: null,
    moves: 0,
    hostPick: null,
    guestPick: null,
    rpsResult: null,
    ts: Date.now(),
  };

  // Save game to Firebase
  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(gameData)
  });

  // Send invite message in chat
  const inviteMsg = {
    id: uid(),
    from: S.user.name,
    text: "🎮 Game invite: " + (gameType === "tictactoe" ? "Tic Tac Toe ❌⭕" : "Rock Paper Scissors ✊"),
    ts: Date.now(),
    type: "game_invite",
    gameId: gameId,
    gameType: gameType,
    replyTo: null,
    starred: false,
    reactions: {},
    deleted: false,
    edited: false,
  };
  await DB.sendMessage(chatId, inviteMsg);
  showToast("🎮 دعوة اللعب أُرسلت!", "✅");
}

/* ─── الاستماع لتحديثات اللعبة ─── */
let _gameListeners = {};
function listenToGame(gameId){
  if(_gameListeners[gameId]) return;
  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const poll = async () => {
    try{
      const res = await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json");
      if(!res.ok) return;
      const game = await res.json();
      if(!game) return;
      const prev = S.onlineGame;
      S.onlineGame = game;
      // Check if game just ended
      if(game.status === "finished" && prev && prev.status === "playing"){
        if(game.winner === S.user.name) showToast("🏆 فزت!", "🎉");
        else if(game.winner === "draw") showToast("🤝 تعادل!", "");
        else showToast("😔 خسرت", "");
      }
      if(game.status === "declined"){
        showToast("❌ رُفضت دعوة اللعب", "");
        S.activeGameId = null;
        S.onlineGame = null;
        clearInterval(_gameListeners[gameId]);
        delete _gameListeners[gameId];
      }
      render();
    }catch(e){}
  };
  poll();
  _gameListeners[gameId] = setInterval(poll, 1500);
}

/* ─── حركة Tic Tac Toe أونلاين ─── */
async function onlineTTTMove(gameId, index){
  const game = S.onlineGame;
  if(!game || game.status !== "playing") return;
  if(game.turn !== S.user.name) return; // مش دورك
  if(game.board[index]) return; // الخلية ممتلئة

  const symbol = game.host === S.user.name ? "X" : "O";
  const newBoard = [...game.board];
  newBoard[index] = symbol;

  // تحقق من الفائز
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let winner = null;
  for(const [a,b,c] of wins){
    if(newBoard[a] && newBoard[a]===newBoard[b] && newBoard[a]===newBoard[c]){
      winner = game.turn; break;
    }
  }
  const moves = game.moves + 1;
  const isDraw = !winner && moves === 9;
  const nextTurn = game.turn === game.host ? game.guest : game.host;
  const status = (winner || isDraw) ? "finished" : "playing";

  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const update = {
    board: newBoard,
    turn: nextTurn,
    winner: winner || (isDraw ? "draw" : null),
    moves: moves,
    status: status,
  };
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(update)
  });

  if(status === "finished"){
    const resultText = winner ? "🏆 " + winner + " wins Tic Tac Toe!" : "🤝 Tic Tac Toe: Draw!";
    const msg = {id:uid(),from:S.user.name,text:"🎮 "+resultText,ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(game.chatId, msg);
  }
}

/* ─── حركة RPS أونلاين ─── */
async function onlineRPSMove(gameId, pick){
  const game = S.onlineGame;
  if(!game || game.status !== "playing") return;
  const isHost = game.host === S.user.name;
  const field = isHost ? "hostPick" : "guestPick";

  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + "/" + field + ".json", {
    method: "PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(pick)
  });

  // تحقق من اكتمال الجولة
  const newGame = {...game, [field]: pick};
  if(newGame.hostPick && newGame.guestPick){
    const beats = {"✊":"✌️", "✌️":"🖐️", "🖐️":"✊"};
    let winner = null, result = "";
    if(newGame.hostPick === newGame.guestPick){
      winner = "draw"; result = "🤝 تعادل!";
    } else if(beats[newGame.hostPick] === newGame.guestPick){
      winner = newGame.host; result = "🏆 " + newGame.host + " wins RPS!";
    } else {
      winner = newGame.guest; result = "🏆 " + newGame.guest + " wins RPS!";
    }
    await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
      method: "PATCH",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({status:"finished", winner, rpsResult: result})
    });
    const msg = {id:uid(),from:S.user.name,text:"🎮 "+result,ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(game.chatId, msg);
  } else {
    showToast("انتظر خصمك...", "⏳");
  }
}

}

function initParticles(){

  const canvas = document.createElement("div");
  canvas.id="fc-particles";

  for(let i=0;i<18;i++){
    const p=document.createElement("div");
    p.className="particle";
    const x=Math.random()*100, dur=6+Math.random()*14, delay=-Math.random()*15;
    const dx=(Math.random()-0.5)*80;
    p.style.cssText=`left:${x}%;animation-duration:${dur}s;animation-delay:${delay}s;--dx:${dx}px;opacity:${0.2+Math.random()*.4};width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;

  }
}

/* ─── THEME SYSTEM (color) ─── */
const THEMES = {
  frost:   {name:"❄️ Frost",    ac:"#38bdf8", bg:"#05101f"},
  ocean:   {name:"🌊 Ocean",    ac:"#06b6d4", bg:"#030d14"},
  violet:  {name:"💜 Violet",   ac:"#a78bfa", bg:"#0d0814"},
  rose:    {name:"🌸 Rose",     ac:"#fb7185", bg:"#140810"},
  emerald: {name:"🌿 Emerald",  ac:"#34d399", bg:"#040d0a"},
  amber:   {name:"🌙 Amber",    ac:"#fbbf24", bg:"#100c02"},
};

function applyColorTheme(theme){
  const t=THEMES[theme]||THEMES.frost;
  document.documentElement.setAttribute("data-theme",theme==="frost"?"":theme);
  // Also update meta theme-color dynamically
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute("content",t.bg);
  S.colorTheme=theme;
  localStorage.setItem("fc_color_theme",theme);
}

function renderThemePickerModal(){
  const ov=h("div",{className:"overlay",onClick:()=>{S.themePickerModal=false;render();}});
  const modal=h("div",{className:"modal",onClick:e=>e.stopPropagation(),style:{maxWidth:"380px"}});
  modal.appendChild(h("h3",{style:{fontSize:"15px",fontWeight:"900",marginBottom:"16px"}},"🎨 Color Themes"));
  const grid=h("div",{className:"theme-grid"});
  Object.entries(THEMES).forEach(([key,t])=>{
    const sw=h("div",{
      className:"theme-swatch"+(S.colorTheme===key?" active":""),
      style:{background:"linear-gradient(135deg,"+t.bg+","+t.ac+"22)",border:"2px solid "+(S.colorTheme===key?t.ac:"transparent")},
      onClick:()=>{applyColorTheme(key);S.themePickerModal=false;render();}
    });
    sw.appendChild(h("div",{style:{fontSize:"20px",marginBottom:"4px"}},t.name.split(" ")[0]));
    sw.appendChild(h("div",{style:{color:t.ac,fontFamily:"JetBrains Mono,monospace",letterSpacing:".3px"}},t.name.split(" ")[1]));
    grid.appendChild(sw);
  });
  modal.appendChild(grid);
  const cl=h("button",{style:{width:"100%",marginTop:"14px",padding:"10px",borderRadius:"12px",background:"var(--bg3)",border:"1px solid var(--bd2)",color:"var(--t3)",cursor:"pointer",fontWeight:"700",fontSize:"11px"},onClick:()=>{S.themePickerModal=false;render();}},T[S.lang].close||"Close");
  modal.appendChild(cl);
  ov.appendChild(modal);
  return ov;
}

/* ─── CUSTOM AVATAR / PROFILE PIC ─── */
function renderCustomAv(name,size,opts){
  const custom=S.avatars&&S.avatars[name];
  if(custom){
    const wrap=h("div",{className:"av",style:{width:size+"px",height:size+"px",overflow:"hidden",padding:"0",flexShrink:"0",position:"relative"}});
    const img=h("img",{className:"av-custom",src:custom,alt:name,style:{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}});
    img.onerror=()=>{wrap.innerHTML="";wrap.style.background=nameCol(name);wrap.style.fontSize=Math.max(10,size*.38)+"px";wrap.textContent=(name||"?")[0].toUpperCase();};
    wrap.appendChild(img);
    if(opts&&opts.online){const dot=h("div",{className:"av-dot"});wrap.appendChild(dot);}
    return wrap;
  }
  return av(name,size,opts);
}

function openAvatarUpload(forUser){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.style.display="none";
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>3*1024*1024){showToast("Max 3MB","⚠️");return;}
    const r=new FileReader();
    r.onload=ev=>{
      S.avatars={...S.avatars,[forUser]:ev.target.result};
      localStorage.setItem("fc_avatars",JSON.stringify(S.avatars));
      // Update in Firebase too
      if(S.user&&forUser===S.user.name){
        DB.setUser(forUser,{...S.user,avatar:ev.target.result});
      }
      showToast("Profile picture updated!","📸");
      render();
    };
    r.readAsDataURL(f);
  };
  document.body.appendChild(inp);inp.click();setTimeout(()=>inp.remove(),2000);
}

/* ─── PUSH NOTIFICATIONS ─── */
async function requestNotifPerm(){
  if(!("Notification" in window)){showToast("Notifications not supported","⚠️");return;}
  const perm=await Notification.requestPermission();
  S.notifGranted=perm==="granted";
  if(perm==="granted") showToast("Notifications enabled! 🔔","✅");
  else showToast("Notifications blocked","❌");
  render();
}

function sendLocalNotif(from,text){
  if(!S.notifGranted||document.hasFocus())return;
  try{
    const n=new Notification("FrostChat — "+from,{
      body:text&&text.length>60?text.slice(0,60)+"…":text||"New message",
      icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>",
      badge:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>",
      tag:"frostchat-msg",
      renotify:true,
      silent:false,
    });
    n.onclick=()=>{window.focus();n.close();};
    setTimeout(()=>n.close(),5000);
  }catch(e){}
}

/* ─── SEND BUTTON ANIMATION ─── */
function animateSendBtn(){
  const sb=document.getElementById("send-btn");
  if(!sb)return;
  sb.classList.add("send-anim");
  setTimeout(()=>sb.classList.remove("send-anim"),350);
}

/* ─── SCROLL TO BOTTOM FAB ─── */
function renderScrollFab(){
  const area=document.getElementById("msgs-area");
  if(!area)return null;
  const fab=h("button",{className:"scroll-to-bottom scroll-fab",
    onClick:()=>{const e=document.getElementById("msgs-end");if(e)e.scrollIntoView({behavior:"smooth"});}},
    "↓");
  return fab;
}

/* ─── APPLY THEME ON LOAD ─── */
if(S.colorTheme&&S.colorTheme!=="frost"){
  applyColorTheme(S.colorTheme);
}

/* ─── ANIMATED MESSAGE WRAPPER ─── */
function wrapMsgAnim(el,own){
  el.style.animation=own?"msgSlideInRight .22s ease":"msgSlideInLeft .22s ease";
  return el;
}

/* ─── VIBRATION FEEDBACK (mobile) ─── */
function haptic(pattern){
  if(navigator.vibrate)navigator.vibrate(pattern||8);
}

/* ─── INTERCEPT pushNotif to use new system ─── */
window.__origPushNotif=pushNotif;
function pushNotif(from,text){
  sendLocalNotif(from,text);
}
/* ==========================================
   BOOT
========================================== */

function boot(){
  window.__appRender=render;
  // Apply saved color theme
  if(S.colorTheme&&S.colorTheme!=="frost")applyColorTheme(S.colorTheme);
  render();
  // Auto clean other accounts if admin
  setTimeout(autoCleanUsers, 2000);
  if(!S.user)return;
  const name=S.user.name;
  DB.setUser(name,{...S.user,online:true,lastSeen:Date.now()});
  DB.setupPresence(name);
  UNSUB.users=DB.onUsers(u=>{
    S.users=u||{};
    if(!S.users[YOU_NAME])S.users[YOU_NAME]={name:YOU_NAME,online:true,status:"Your personal space 📝",vipCode:""};
    render();
  });
  UNSUB.chats=DB.onChats(c=>{
    const myChats=Object.values(c||{}).filter(ch=>ch?.members?.includes(name));
    S.chats=myChats;
    myChats.forEach(ch=>{
      if(!UNSUB["msgs_"+ch.id]){
        UNSUB["msgs_"+ch.id]=DB.onMessages(ch.id,msgsMap=>{
          if(msgsMap&&Object.keys(msgsMap).length>0){
            const prev=Object.values(S.messages[ch.id]||{}).length;
            const curr=Object.values(msgsMap).length;
            if(curr>prev){
              const newMsg=Object.values(msgsMap).sort((a,b)=>a.ts-b.ts).pop();
              if(newMsg&&newMsg.from!==name&&S.activeChat?.id!==ch.id){
                S.unread={...S.unread,[ch.id]:(S.unread[ch.id]||0)+1};
                sendLocalNotif(newMsg.from,newMsg.type==="image"?"📸 Image":newMsg.type==="voice"?"🎤 Voice message":newMsg.text);
              }
            }
            S.messages={...S.messages,[ch.id]:msgsMap};
          }
          render();
        });
      }
    });
    render();
  });
}

window._stories={};
// Load stories from Firebase on start
if(window.__fb&&!window.__fb.DEMO_MODE){
  const {db,ref,onValue}=window.__fb;
  onValue(ref(db,"stories"),snap=>{
    const data=snap.val()||{};
    const now=Date.now();
    window._stories=Object.fromEntries(Object.entries(data).filter(([_,s])=>s.expiresAt>now));
    if(window.__appRender)window.__appRender();
  });
}
window.__appRender=render;
boot();
