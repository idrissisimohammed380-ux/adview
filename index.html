<style>
:root {
  --bg0: #080808;
  --bg1: #101010;
  --bg2: #181818;
  --bg3: #222222;
  --bg4: #2a2a2a;
  --ac:  #22c55e;
  --ac2: #16a34a;
  --acg: rgba(34,197,94,.16);
  --acd: rgba(34,197,94,.07);
  --t1:  #f0fdf4;
  --t2:  #9ca3af;
  --t3:  #4b5563;
  --bd:  #1c1c1c;
  --bd2: #272727;
  --mo:  linear-gradient(145deg,#14532d,#166534);
  --mi:  #1c1c1c;
  --sh:  0 8px 48px rgba(0,0,0,.85);
  --sh2: 0 2px 14px rgba(0,0,0,.6);
  --r:   14px;
}
.light {
  --bg0: #f0fdf4; --bg1: #ffffff; --bg2: #f1f8f2; --bg3: #e2f0e3; --bg4: #d0e9d1;
  --ac: #16a34a; --ac2: #15803d; --acg: rgba(22,163,74,.14); --acd: rgba(22,163,74,.06);
  --t1: #052e16; --t2: #4b5563; --t3: #9ca3af;
  --bd: #d1fae5; --bd2: #a7f3d0;
  --mo: linear-gradient(145deg,#16a34a,#15803d); --mi: #ffffff;
  --sh: 0 4px 24px rgba(0,0,0,.08); --sh2: 0 2px 8px rgba(0,0,0,.06);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg0);color:var(--t1);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 24px rgba(34,197,94,.22)}50%{box-shadow:0 0 56px rgba(34,197,94,.52)}}
@keyframes floatUp{0%{transform:translateY(0);opacity:.4}100%{transform:translateY(-110vh);opacity:0}}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 8px rgba(239,68,68,.25)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes msgSlide{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── App Shell ── */
#app{display:flex;height:100vh;overflow:hidden;animation:fadeIn .3s}
#sidebar{display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--bg1);transition:width .3s ease;flex-shrink:0;overflow:hidden}
#chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Login ── */
#login{min-height:100vh;background:var(--bg0);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:floatUp linear infinite}
.login-card{width:min(420px,94vw);z-index:1;animation:slideUp .6s cubic-bezier(.34,1.56,.64,1);text-align:center}
.login-card h1{font-size:36px;font-weight:900;letter-spacing:-2px;margin-bottom:3px}
.login-card .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3.5px;text-transform:uppercase;color:var(--t3);margin-bottom:26px}
.login-box{background:var(--bg1);border-radius:20px;padding:28px 24px 22px;border:1px solid var(--bd2);box-shadow:var(--sh)}
.inp{width:100%;padding:13px 15px;border-radius:12px;background:var(--bg2);border:1.5px solid var(--bd2);color:var(--t1);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all .2s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:var(--ac);color:#031a03;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--ac2);transform:translateY(-1px);box-shadow:0 6px 20px var(--acg)}
.btn-primary:disabled{background:var(--bg3);color:var(--t3);cursor:not-allowed;transform:none;box-shadow:none}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:7px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;font-size:10px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.active{border-bottom-color:var(--ac);color:var(--ac)}
.tab:hover:not(.active){color:var(--t2)}

/* ── Chat rows ── */
.chat-row{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.chat-row:hover{background:var(--bg3)}
.chat-row.active{background:var(--acd);border-left-color:var(--ac)}

/* ── Avatar ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#031a03;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;position:relative}
.av-ring{border:2.5px solid var(--ac);box-shadow:0 0 0 3px var(--bg0),0 0 18px rgba(34,197,94,.4)}
.online-dot{position:absolute;border-radius:50%;background:#22c55e;border:2px solid var(--bg0);box-shadow:0 0 6px #22c55e88}

/* ── Message bubbles ── */

/* ── Dropdown menus ── */

<script>

(function() {
  var DB_URL = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  var _listeners = {};

  function dbUrl(path) {
    return DB_URL + "/" + path.replace(/^\/+/, "") + ".json";
  }
  async function dbGet(path) {
    try {
      var r = await fetch(dbUrl(path));
      return r.ok ? await r.json() : null;
    } catch(e) { return null; }
  }
  async function dbSet(path, val) {
    try {
      var r = await fetch(dbUrl(path), {method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(val)});
      return r.ok;
    } catch(e) { return false; }
  }
  async function dbUpdate(path, val) {
    try {
      var r = await fetch(dbUrl(path), {method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(val)});
      return r.ok;
    } catch(e) { return false; }
  }
  async function dbDelete(path) {
    try {
      var r = await fetch(dbUrl(path), {method:"DELETE"});
      return r.ok;
    } catch(e) { return false; }
  }
  function dbListen(path, cb) {
    if (!_listeners[path]) {
      _listeners[path] = {cbs:[], lastHash:undefined, timer:null};
      var poll = async function() {
        var data = await dbGet(path);
        var hash = JSON.stringify(data);
        if (hash !== _listeners[path].lastHash) {
          _listeners[path].lastHash = hash;
          _listeners[path].cbs.forEach(function(f){ f(data); });
        }
      };
      poll();
      _listeners[path].timer = setInterval(poll, 1500);
    }
    _listeners[path].cbs.push(cb);
    return function() {
      if (!_listeners[path]) return;
      _listeners[path].cbs = _listeners[path].cbs.filter(function(f){ return f !== cb; });
      if (_listeners[path].cbs.length === 0) {
        clearInterval(_listeners[path].timer);
        delete _listeners[path];
      }
    };
  }
  function makeRef(path) {
    return {
      _path: path,
      set: function(v) { return dbSet(path, v); },
      update: function(v) { return dbUpdate(path, v); },
      remove: function() { return dbDelete(path); },
      once: function() {
        return dbGet(path).then(function(v){ return {val:function(){return v;}}; });
      },
      on: function(evt, cb) {
        dbListen(path, function(data){ cb({val:function(){return data;}}); });
      },
      off: function() {
        if (_listeners[path]) {
          clearInterval(_listeners[path].timer);
          delete _listeners[path];
        }
      },
      onDisconnect: function() {
        return {
          set: function(v) {
            window.addEventListener("beforeunload", function(){
              navigator.sendBeacon(dbUrl(path), JSON.stringify(v));
            });
          }
        };
      }
    };
  }

  // Test connection
  dbGet(".info").then(function(d){
    window.__fbConnected = d !== null;
    var badge = document.getElementById("conn-badge");
    if (badge) badge.style.display = window.__fbConnected ? "none" : "flex";
    if (window.__appRender) window.__appRender();
  });

  window.__fb = {
    DEMO_MODE: false,
    ref: function(db, path){ return makeRef(path); },
    set: function(r,v){ return r.set(v); },
    update: function(r,v){ return r.update(v); },
    push: function(r,v){
      var key = Date.now()+"_"+Math.random().toString(36).slice(2,8);
      return makeRef(r._path+"/"+key).set(v).then(function(){ return {key:key}; });
    },
    onValue: function(r,cb){
      return dbListen(r._path, function(data){ cb({val:function(){return data;}}); });
    },
    off: function(r){ r.off(); },
    get: function(r){ return r.once(); },
    remove: function(r){ return r.remove(); },
    onDisconnect: function(r){ return r.onDisconnect(); },
    serverTimestamp: function(){ return Date.now(); },
    query: function(r){ return r; },
    orderByChild: function(k){ return function(r){return r;}; },
    limitToLast: function(n){ return function(r){return r;}; }
  };

  window.__fbReady = true;
})();
// Start app immediately — no waiting for event
window.__appReady = false;

</script>

const GS = ["#22c55e","#16a34a","#15803d","#4ade80","#86efac","#059669","#10b981","#34d399","#6ee7b7","#a7f3d0"];
const nameCol = n => { let h=0; for(let i=0;i<n.length;i++) h=n.charCodeAt(i)+((h<<5)-h); return GS[Math.abs(h)%GS.length]; };
const uid = () => `${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
const timeFmt = ts => ts ? new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
const dateFmt = ts => {
  if(!ts) return "";
  const d=new Date(ts), now=new Date();
  const t = T[S.lang];
  if(d.toDateString()===now.toDateString()) return t.today;
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return t.yesterday;
  return d.toLocaleDateString();
};
const $ = id => document.getElementById(id);
const h = (tag, props={}, ...kids) => {
  const el = document.createElement(tag);
  const {className, style, ...rest} = props;
  if(className) el.className = className;
  if(style) Object.assign(el.style, style);
  Object.entries(rest).forEach(([k,v]) => {
    if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k === "html") el.innerHTML = v;
    else if(k === "text") el.textContent = v;
    else if(k === "data") Object.entries(v).forEach(([dk,dv]) => el.dataset[dk]=dv);
    else el.setAttribute(k, v);
  });
  kids.flat(Infinity).forEach(kid => {
    if(kid == null || kid === false) return;
    el.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  });
  return el;
};

// In-memory store for demo mode
const MEM = { users:{}, chats:{}, messages:{}, typing:{} };

const DB = {
  // Register / update user presence
  async setUser(name, data){
    if(!window.__fb || window.__fb.DEMO_MODE){ MEM.users[name]={...data,lastSeen:Date.now()}; return; }
    const {db,ref,set} = window.__fb;
    await set(ref(db,`users/${name.replace(/[.#$[\]]/g,"_")}`), {...data,lastSeen:Date.now()});
  },
  // Listen to all users
  onUsers(cb){
    if(!window.__fb || window.__fb.DEMO_MODE){
      cb(MEM.users);
      return ()=>{};
    }
    const {db,ref,onValue,off} = window.__fb;
    const r = ref(db,"users");
    onValue(r, snap=>cb(snap.val()||{}));
    return ()=>off(r);
  },
  // Send message
  async sendMessage(chatId, msg){
    if(!window.__fb || window.__fb.DEMO_MODE){
      if(!MEM.messages[chatId]) MEM.messages[chatId]={};
      MEM.messages[chatId][msg.id]=msg;
      // notify listeners
      if(DB._msgListeners[chatId]) DB._msgListeners[chatId](MEM.messages[chatId]);
      return;
    }
    const {db,ref,set} = window.__fb;
    await set(ref(db,`messages/${chatId}/${msg.id}`), msg);
    // update chat last message
    const {update} = window.__fb;
    await update(ref(db,`chats/${chatId}`),{lastMsg:msg.text,lastFrom:msg.from,ts:msg.ts});
  },
  _msgListeners:{},
  // Listen to messages
  onMessages(chatId, cb){
    if(!window.__fb || window.__fb.DEMO_MODE){
      DB._msgListeners[chatId]=cb;
      cb(MEM.messages[chatId]||{});
      return ()=>{ delete DB._msgListeners[chatId]; };
    }
    const {db,ref,onValue,off,query,orderByChild,limitToLast} = window.__fb;
    const r = query(ref(db,`messages/${chatId}`),orderByChild("ts"),limitToLast(200));
    onValue(r, snap=>cb(snap.val()||{}));
    return ()=>off(r);
  },
  // Edit/delete message
  async updateMessage(chatId, msgId, updates){
    if(!window.__fb || window.__fb.DEMO_MODE){
      if(MEM.messages[chatId]?.[msgId]){
        MEM.messages[chatId][msgId]={...MEM.messages[chatId][msgId],...updates};
        if(DB._msgListeners[chatId]) DB._msgListeners[chatId](MEM.messages[chatId]);
      }
      return;
    }
    const {db,ref,update} = window.__fb;
    await update(ref(db,`messages/${chatId}/${msgId}`), updates);
  },
  // Save/listen chats
  async saveChat(chat){
    if(!window.__fb || window.__fb.DEMO_MODE){ MEM.chats[chat.id]=chat; return; }
    const {db,ref,set} = window.__fb;
    await set(ref(db,`chats/${chat.id}`), chat);
  },
  onChats(cb){
    if(!window.__fb || window.__fb.DEMO_MODE){ cb(MEM.chats); return ()=>{}; }
    const {db,ref,onValue,off} = window.__fb;
    const r = ref(db,"chats");
    onValue(r, snap=>cb(snap.val()||{}));
    return ()=>off(r);
  },
  // Typing indicator
  async setTyping(chatId, name, isTyping){
    if(!window.__fb || window.__fb.DEMO_MODE){ if(!MEM.typing[chatId]) MEM.typing[chatId]={}; MEM.typing[chatId][name]=isTyping; return; }
    const {db,ref,set} = window.__fb;
    await set(ref(db,`typing/${chatId}/${name.replace(/[.#$[\]]/g,"_")}`), isTyping?Date.now():null);
  },
  onTyping(chatId,cb){
    if(!window.__fb || window.__fb.DEMO_MODE){ cb(MEM.typing[chatId]||{}); return ()=>{}; }
    const {db,ref,onValue,off} = window.__fb;
    const r = ref(db,`typing/${chatId}`);
    onValue(r, snap=>cb(snap.val()||{}));
    return ()=>off(r);
  },
  // Presence on disconnect
  setupPresence(name){
    if(!window.__fb || window.__fb.DEMO_MODE) return;
    const {db,ref,set,onDisconnect,onValue} = window.__fb;
    const userRef = ref(db,`users/${name.replace(/[.#$[\]]/g,"_")}/lastSeen`);
    onDisconnect(userRef).set(Date.now());
    const onlineRef = ref(db,`users/${name.replace(/[.#$[\]]/g,"_")}/online`);
    set(onlineRef, true);
    onDisconnect(onlineRef).set(false);
  }
};

let renderScheduled = false;
function render(){
  if(renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(()=>{
    renderScheduled = false;
    _render();
  });
}

function _render(){
  const root = $("root");
  if(!root) return;
  const t = T[S.lang];
  document.documentElement.className = S.theme==="light"?"light":"";
  document.documentElement.setAttribute("dir", S.lang==="ar"?"rtl":"ltr");

  root.innerHTML = "";

  // Demo banner
  const db_banner = $("demo-banner");
  if(db_banner) db_banner.style.display = (window.__fb?.DEMO_MODE) ? "block":"none";

  if(!S.user){
    root.appendChild(renderLogin());
    return;
  }

  // Call screen
  if(S.callScreen){
    root.appendChild(renderCallScreen());
    return;
  }

  root.appendChild(renderApp());

  // Modals
  if(S.grpModal)   root.appendChild(renderGrpModal());
  if(S.fwdModal)   root.appendChild(renderFwdModal());
  if(S.profModal)  root.appendChild(renderProfModal());
  if(S.aboutModal) root.appendChild(renderAboutModal());
  if(S.setupModal) root.appendChild(renderSetupModal());
  if(S.vipModal)   root.appendChild(renderVIPModal());
}

/* ═══════════════════════════════════════════════
   JOIN
═══════════════════════════════════════════════ */
async function doJoin(){
  const name = S.nameInput.trim();
  if(!name) return;

  // Wait for Firebase
  if(!window.__fbReady){
    await new Promise(res=>document.addEventListener("fb-ready",res,{once:true}));
  }

  S.user = {name, status:"", vipCode:S.vipCode||"", lastSeen:Date.now(), joinedAt:Date.now()};
  // Restore existing user data if re-logging
  const savedUser = JSON.parse(localStorage.getItem("fc_user")||"null");
  if(savedUser && savedUser.name===name){ S.user={...savedUser, online:true, lastSeen:Date.now()}; }
  localStorage.setItem("fc_user", JSON.stringify(S.user));

  // Register presence
  await DB.setUser(name, {...S.user, online:true, lastSeen:Date.now()});
  DB.setupPresence(name);

  // Listen to all users
  UNSUB.users = DB.onUsers(usersMap=>{
    S.users = usersMap;
    render();
  });

  // Listen to all chats
  UNSUB.chats = DB.onChats(chatsMap=>{
    S.chats = Object.values(chatsMap||{}).filter(c=>c.members?.includes(name));
    render();
  });

  requestNotifPerm();
  render();
}

/* ─── Chat List ─── */
function renderChatList(){
  const t = T[S.lang];
  const wrap = h("div",{});
  const sorted = [...S.chats].sort((a,b)=>{
    const ap=S.pinned.includes(a.id), bp=S.pinned.includes(b.id);
    if(ap&&!bp)return-1; if(!ap&&bp)return 1;
    return(b.ts||0)-(a.ts||0);
  }).filter(c=>!S.q||c.name.toLowerCase().includes(S.q.toLowerCase()));

  if(!sorted.length){
    const empty = h("div",{style:{padding:"30px",textAlign:"center",color:"var(--t3)"}});
    empty.appendChild(ico("chat",36,"var(--t3)"));
    empty.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"var(--t2)",margin:"10px 0 3px"}},t.noChats));
    empty.appendChild(h("div",{style:{fontSize:"10px"}},t.findFriends));
    wrap.appendChild(empty);
    return wrap;
  }

  sorted.forEach(c=>{
    const lastMsgsArr = Object.values(S.messages[c.id]||{}).sort((a,b)=>a.ts-b.ts);
    const last = lastMsgsArr[lastMsgsArr.length-1];
    const active = S.activeChat?.id===c.id;
    const cu = S.users[c.name];
    const unreadCnt = S.unread[c.id]||0;

    const row = h("div",{
      className:"chat-row"+(active?" active":""),
      onClick:()=>openChat(c),
    });

    // Avatar
    const avWrap = h("div",{style:{position:"relative"}});
    avWrap.appendChild(av(c.name,42,{online:c.type==="dm"?!!(cu?.online):undefined}));
    if(c.type==="group"){
      const gb = h("div",{className:"grp-badge"});
      gb.appendChild(ico("group",8,"#031a03"));
      avWrap.appendChild(gb);
    }
    row.appendChild(avWrap);

    // Info
    const info = h("div",{style:{flex:"1",minWidth:"0"}});
    const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}});
    const nameEl = h("span",{style:{fontSize:"12px",fontWeight:"800",color:"var(--t1)",display:"flex",alignItems:"center",gap:"4px"}},c.name);
    if(S.pinned.includes(c.id)) nameEl.appendChild(ico("pin",9,"var(--ac)"));
    if(S.muted.includes(c.id)) nameEl.appendChild(ico("mute",9,"var(--t3)"));
    const chatUserVip = c.type==="dm" ? S.users[c.name]?.vipCode : null;
    const chatVipB = renderVIPBadge(chatUserVip, 8);
    if(chatVipB) nameEl.appendChild(chatVipB);
    top.appendChild(nameEl);
    top.appendChild(h("span",{style:{fontSize:"9px",color:"var(--t3)",fontFamily:"'JetBrains Mono',monospace"}},last?timeFmt(last.ts):""));
    info.appendChild(top);
    const preview = last
      ? (last.deleted?"🚫 Deleted":last.type==="voice"?"🎤 Voice":(last.from===S.user.name?"✓ ":"")+last.text)
      : t.hello;
    info.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},preview));
    row.appendChild(info);

    if(unreadCnt>0&&!active) row.appendChild(h("span",{className:"badge"},unreadCnt));

    wrap.appendChild(row);
  });

  return wrap;
}

/* ─── Chat Panel ─── */
function renderChatPanel(){
  const t = T[S.lang];
  const c = S.activeChat;
  const cu = S.users[c.name];
  const wrap = h("div",{style:{flex:"1",display:"flex",flexDirection:"column",overflow:"hidden",animation:"fadeIn .25s"}});

  // ── Header ──
  const hdr = h("div",{style:{padding:"9px 13px",borderBottom:"1px solid var(--bd)",background:"var(--bg1)",display:"flex",alignItems:"center",gap:"10px",flexShrink:"0",zIndex:"10"}});
  const backBtn = h("button",{className:"ib",onClick:()=>setActiveChat(null)});
  backBtn.appendChild(ico("back",18,"var(--t3)"));
  hdr.appendChild(backBtn);

  const avEl = h("div",{style:{cursor:"pointer"},onClick:()=>{S.profModal=cu||{name:c.name};render();}});
  avEl.appendChild(av(c.name,36,{online:c.type==="dm"?!!(cu?.online):undefined}));
  hdr.appendChild(avEl);

  const hinfo = h("div",{style:{flex:"1",minWidth:"0"}});
  const hdrNameRow = h("div",{style:{display:"flex",alignItems:"center",gap:"6px",lineHeight:"1.1"}});
  hdrNameRow.appendChild(h("span",{style:{fontSize:"13px",fontWeight:"800",color:"var(--t1)"}},c.name));
  if(c.type==="dm"){
    const hdrVip = renderVIPBadge(S.users[c.name]?.vipCode, 9);
    if(hdrVip) hdrNameRow.appendChild(hdrVip);
  }
  hinfo.appendChild(hdrNameRow);
  const subline = h("div",{style:{fontSize:"9px",color:"var(--t3)",fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:"3px"}});
  if(c.type==="group"){
    subline.appendChild(ico("group",9,"var(--t3)"));
    subline.appendChild(document.createTextNode(" "+c.members?.length+" "+t.members));
  } else if(cu?.online){
    subline.appendChild(h("span",{className:"status-dot",style:{width:"5px",height:"5px"}}));
    subline.appendChild(document.createTextNode(" "+t.online));
  } else {
    subline.appendChild(document.createTextNode(t.offline));
  }
  hinfo.appendChild(subline);
  hdr.appendChild(hinfo);

  [["phone",()=>{S.callScreen={name:c.name,type:"voice"};render();}],
   ["video",()=>{S.callScreen={name:c.name,type:"video"};render();}]].forEach(([ic,fn])=>{
    const btn = h("button",{className:"ib",onClick:fn});
    btn.appendChild(ico(ic,15,"var(--t3)"));
    hdr.appendChild(btn);
  });

  const moreWrap = h("div",{style:{position:"relative"}});
  const moreBtn = h("button",{className:"ib",onClick:e=>{e.stopPropagation();S.chatMenu=!S.chatMenu;render();}});
  moreBtn.appendChild(ico("more",16,"var(--t3)"));
  moreWrap.appendChild(moreBtn);
  if(S.chatMenu){
    const menu = h("div",{className:"dropdown",style:{top:"110%",right:"0",minWidth:"175px"}},
      ...[
        {ic:"pin",lb:t.pin,fn:()=>{togglePin(c.id);S.chatMenu=false;render();}},
        {ic:"mute",lb:t.mute,fn:()=>{toggleMute(c.id);S.chatMenu=false;render();}},
        {ic:"trash",lb:t.clear,fn:()=>{clearChat(c.id);S.chatMenu=false;render();}},
        {ic:"logout",lb:t.deleteChat,fn:()=>{deleteChat(c.id);S.chatMenu=false;render();},d:true},
      ].map(item=>{
        const btn = h("button",{className:"ditem"+(item.d?" danger":""),onClick:item.fn});
        btn.appendChild(ico(item.ic,13,item.d?"#f87171":"var(--t3)"));
        btn.appendChild(document.createTextNode(" "+item.lb));
        return btn;
      })
    );
    moreWrap.appendChild(menu);
  }
  hdr.appendChild(moreWrap);
  wrap.appendChild(hdr);

  // ── Messages ──
  const msgsWrap = h("div",{
    id:"msgs-area",
    style:{flex:"1",overflowY:"auto",padding:"12px 16px",background:"var(--bg0)"},
    onClick:()=>{S.msgMenu=null;S.chatMenu=false;render();}
  });

  const allMsgs = Object.values(S.messages[c.id]||{}).sort((a,b)=>a.ts-b.ts);

  if(!allMsgs.length){
    const es = h("div",{style:{textAlign:"center",padding:"40px 16px",color:"var(--t3)"}});
    es.appendChild(h("div",{style:{fontSize:"13px",fontWeight:"700",color:"var(--t2)",marginBottom:"4px"}},t.hello));
    const enc = h("div",{style:{fontSize:"10px",display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}});
    enc.appendChild(ico("lock",10,"var(--t3)"));
    enc.appendChild(document.createTextNode(" "+t.e2e));
    es.appendChild(enc);
    msgsWrap.appendChild(es);
  } else {
    const byDate = {};
    allMsgs.forEach(m=>{ const d=dateFmt(m.ts); if(!byDate[d]) byDate[d]=[]; byDate[d].push(m); });
    Object.entries(byDate).forEach(([date,dayMsgs])=>{
      const dLabel = h("div",{style:{textAlign:"center",margin:"10px 0"}});
      dLabel.appendChild(h("span",{style:{background:"var(--bg2)",padding:"2px 12px",borderRadius:"20px",fontSize:"9px",color:"var(--t3)",border:"1px solid var(--bd2)",fontFamily:"'JetBrains Mono',monospace"}},date));
      msgsWrap.appendChild(dLabel);
      dayMsgs.forEach(m=>msgsWrap.appendChild(renderMessage(m,c)));
    });
  }

  if(S.botTyping){
    const ti = h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});
    ti.appendChild(av(c.name,22,{}));
    const tb = h("div",{className:"typing-bubble"});
    [0,1,2].forEach(i=>{ tb.appendChild(h("span",{className:"typing-dot",style:{animationDelay:i*.2+"s"}})); });
    ti.appendChild(tb);
    msgsWrap.appendChild(ti);
  }

  const endEl = h("div",{id:"msgs-end"});
  msgsWrap.appendChild(endEl);
  wrap.appendChild(msgsWrap);

  // ── Reply bar ──
  if(S.replyTo){
    const rb = h("div",{className:"reply-bar"});
    rb.appendChild(h("div",{className:"reply-line"}));
    rb.appendChild(ico("reply",11,"var(--ac)"));
    const rinfo = h("div",{style:{flex:"1",minWidth:"0"}});
    rinfo.appendChild(h("div",{style:{fontSize:"9px",color:"var(--ac)",fontWeight:"800",marginBottom:"1px"}},t.replyTo+" "+S.replyTo.from));
    rinfo.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},S.replyTo.text?.slice(0,60)));
    rb.appendChild(rinfo);
    const rx = h("button",{style:{background:"none",border:"none",cursor:"pointer"},onClick:()=>{S.replyTo=null;render();}});
    rx.appendChild(ico("block",13,"var(--t3)"));
    rb.appendChild(rx);
    wrap.appendChild(rb);
  }

  // ── Emoji Picker ──
  if(S.emojiOpen){
    const EMOJI_LIST = "😀😂🥰😎🤔😅🥳😢😡🤗🫶😴🤩👍❤️🔥✨🎉👏🙏💯💪🌟🎵⚡🍀🌈💎👑❄️🌙⭐🏔️🎯🚀💬🤝😆🥹🎊🙌😍🤣😘💀👻🎃🌹🦋🌊🏆💡🎶🍕🍔🍦🎂🎁🎈🎤🎸🏀⚽🎮🃏🎲";
    const ep = h("div",{style:{display:"flex",flexWrap:"wrap",gap:"2px",padding:"8px 10px",maxHeight:"110px",overflowY:"auto",borderTop:"1px solid var(--bd)",background:"var(--bg1)",flexShrink:"0"}});
    [...EMOJI_LIST].forEach(em=>{
      const btn = document.createElement("button");
      btn.className = "emoji-btn";
      btn.textContent = em;
      btn.onclick = () => {
        // Insert emoji without re-rendering
        const ta = document.getElementById("chat-input");
        if(ta){
          const pos = ta.selectionStart;
          const val = ta.value;
          ta.value = val.slice(0,pos) + em + val.slice(pos);
          S.input = ta.value;
          ta.focus();
          ta.setSelectionRange(pos+em.length, pos+em.length);
        } else {
          S.input += em;
        }
        S.emojiOpen = false;
        // Only re-render emoji picker area
        render();
      };
      ep.appendChild(btn);
    });
    wrap.appendChild(ep);
  }

  // ── Input Bar — NO re-render on typing ──
  const ibar = h("div",{style:{padding:"8px 10px",background:"var(--bg1)",borderTop:"1px solid var(--bd)",display:"flex",alignItems:"flex-end",gap:"6px",flexShrink:"0"}});

  const emojiBtn = h("button",{className:"ib",style:{color:S.emojiOpen?"var(--ac)":"var(--t3)"},onClick:()=>{S.emojiOpen=!S.emojiOpen;render();}});
  emojiBtn.appendChild(ico("smile",20,S.emojiOpen?"var(--ac)":"var(--t3)"));
  ibar.appendChild(emojiBtn);

  // ★ KEY FIX: textarea uses id="chat-input", updates S.input directly, NO render() on input
  const textarea = document.createElement("textarea");
  textarea.id = "chat-input";
  textarea.className = "msg-input";
  textarea.placeholder = S.rec ? "🎤 "+S.recSec+"s..." : (S.editMsg ? S.editTxt : t.typePH);
  textarea.rows = 1;
  textarea.value = S.editMsg ? S.editTxt : S.input;
  if(S.rec) textarea.disabled = true;
  textarea.addEventListener("input", e => {
    S.input = e.target.value;
    // Auto-resize only — no render()
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 88) + "px";
    // Send button color update
    const sb = document.getElementById("send-btn");
    if(sb){
      sb.style.background = e.target.value.trim() ? "var(--ac)" : "var(--bg3)";
      sb.style.color = e.target.value.trim() ? "#031a03" : "var(--t3)";
    }
    sendTypingIndicator(true);
  });
  textarea.addEventListener("keydown", e => {
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      if(S.editMsg) commitEdit();
      else doSend();
    }
    if(e.key==="Escape" && S.editMsg){ S.editMsg=null; S.editTxt=""; render(); }
  });
  textarea.addEventListener("focus", e => {
    e.target.style.borderColor = "var(--ac)";
    e.target.style.boxShadow = "0 0 0 3px var(--acg)";
  });
  textarea.addEventListener("blur", e => {
    e.target.style.borderColor = "var(--bd2)";
    e.target.style.boxShadow = "none";
    sendTypingIndicator(false);
  });
  ibar.appendChild(textarea);

  // Mic button
  const micBtn = h("button",{
    style:{background:S.rec?"#ef4444":"var(--bg2)",border:"1px solid "+(S.rec?"#ef4444":"var(--bd2)"),cursor:"pointer",padding:"10px",borderRadius:"50%",flexShrink:"0",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",animation:S.rec?"recPulse 1s infinite":"none"},
    onMousedown:startRec, onMouseup:stopRec, onTouchstart:startRec, onTouchend:stopRec,
  });
  micBtn.appendChild(ico("mic",18,S.rec?"#fff":"var(--t3)"));
  ibar.appendChild(micBtn);

  // ★ Send button with id="send-btn"
  const sendBtn = document.createElement("button");
  sendBtn.id = "send-btn";
  sendBtn.className = "send-btn";
  sendBtn.style.background = S.input.trim() ? "var(--ac)" : "var(--bg3)";
  sendBtn.style.color = S.input.trim() ? "#031a03" : "var(--t3)";
  sendBtn.innerHTML = "";
  sendBtn.appendChild(ico("send",14, S.input.trim()?"#031a03":"var(--t3)"));
  sendBtn.appendChild(document.createTextNode(" "+(S.editMsg?"Save":t.send)));
  sendBtn.onclick = () => { if(S.editMsg) commitEdit(); else doSend(); };
  ibar.appendChild(sendBtn);

  if(S.editMsg){
    const cancelBtn = h("button",{
      style:{background:"var(--bg3)",border:"none",cursor:"pointer",padding:"9px 12px",borderRadius:"20px",color:"var(--t3)",fontSize:"11px",fontWeight:"700",fontFamily:"'Plus Jakarta Sans',sans-serif",flexShrink:"0"},
      onClick:()=>{S.editMsg=null;S.editTxt="";render();}
    },t.cancel);
    ibar.appendChild(cancelBtn);
  }

  wrap.appendChild(ibar);

  setTimeout(()=>{
    const e = document.getElementById("msgs-end");
    if(e) e.scrollIntoView({behavior:"smooth"});
    // Restore focus to input if it was focused before
    const ta = document.getElementById("chat-input");
    if(ta && document.activeElement !== ta && S.input) ta.focus();
  },50);

  return wrap;
}

/* ─── Single Message ─── */
function renderMessage(m, chat){
  const t = T[S.lang];
  const own = m.from === S.user.name;
  const open = S.msgMenu === m.id;

  const wrap = h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"5px",position:"relative"}});

  if(!own && chat.type==="group"){
    const fromRow = h("div",{style:{fontSize:"9px",color:"var(--ac)",marginBottom:"2px",paddingLeft:"10px",fontWeight:"800",display:"flex",alignItems:"center",gap:"4px"}},m.from);
    const msgVip = renderVIPBadge(S.users[m.from]?.vipCode, 7);
    if(msgVip) fromRow.appendChild(msgVip);
    wrap.appendChild(fromRow);
  }

  if(m.replyTo){
    const rp = h("div",{style:{maxWidth:"64%",padding:"3px 10px",background:"var(--bg2)",borderRadius:"6px 6px 0 0",borderLeft:"2.5px solid var(--ac)",fontSize:"9px",color:"var(--t3)",marginBottom:"-1px",display:"flex",alignItems:"center",gap:"4px"}});
    rp.appendChild(ico("reply",9,"var(--ac)"));
    rp.appendChild(h("strong",{style:{color:"var(--ac)"}},m.replyTo.from));
    rp.appendChild(document.createTextNode(": "+m.replyTo.text?.slice(0,50)));
    wrap.appendChild(rp);
  }

  const rowWrap = h("div",{style:{position:"relative",maxWidth:"64%",display:"flex",alignItems:"flex-end",gap:"4px",flexDirection:own?"row-reverse":"row"}});

  if(!own){
    rowWrap.appendChild(av(m.from,22,{}));
  }

  const bubble = h("div",{
    className:"bubble"+(own?" own":" other")+(m.deleted?" deleted":""),
    onClick:e=>{e.stopPropagation();S.msgMenu=open?null:m.id;render();}
  });

  if(m.deleted){
    const del = h("span",{style:{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px"}});
    del.appendChild(ico("trash",10,"var(--t3)"));
    del.appendChild(document.createTextNode(t.msgDeleted));
    bubble.appendChild(del);
  } else if(m.type==="voice"){
    const vr = h("span",{style:{display:"flex",alignItems:"center",gap:"6px"}});
    vr.appendChild(ico("mic",13,own?"#86efac":"var(--ac)"));
    vr.appendChild(document.createTextNode(m.text));
    bubble.appendChild(vr);
  } else {
    bubble.appendChild(document.createTextNode(m.text));
  }

  if(m.starred && !m.deleted) bubble.appendChild(h("span",{style:{marginLeft:"4px",fontSize:"9px"}},"⭐"));
  if(m.edited && !m.deleted) bubble.appendChild(h("span",{style:{marginLeft:"4px",fontSize:"8px",opacity:".4",fontStyle:"italic"}},t.edited));

  // Reaction popup (on click)
  if(open && !m.deleted){
    const rxbar = h("div",{className:"rxbar",style:{[own?"left":"right"]:"0"}});
    "❤️😂👍😮😢🔥".split("").filter(x=>x.trim()).forEach(em=>{
      const btn = h("button",{className:"rx-btn",onClick:e=>{e.stopPropagation();doReact(m.id,em);}},em);
      rxbar.appendChild(btn);
    });
    rowWrap.appendChild(rxbar);
  }

  rowWrap.appendChild(bubble);

  // Time + tick
  const meta = h("div",{style:{fontSize:"8px",color:"var(--t3)",flexShrink:"0",fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:"2px"}});
  meta.appendChild(document.createTextNode(timeFmt(m.ts)));
  if(own && !m.deleted){
    meta.appendChild(ico("check",9,"var(--ac)"));
  }
  rowWrap.appendChild(meta);

  wrap.appendChild(rowWrap);

  // Reactions display
  if(m.reactions && Object.values(m.reactions).some(u=>u.length>0)){
    const rxRow = h("div",{style:{display:"flex",gap:"3px",marginTop:"2px",flexWrap:"wrap",justifyContent:own?"flex-end":"flex-start",maxWidth:"64%",paddingLeft:own?"0":"26px"}});
    Object.entries(m.reactions).filter(([,u])=>u.length>0).forEach(([em,users])=>{
      const rb = h("button",{
        style:{background:"var(--bg2)",border:`1px solid ${users.includes(S.user.name)?"var(--ac)":"var(--bd2)"}`,borderRadius:"18px",padding:"1px 6px",fontSize:"11px",cursor:"pointer",color:"var(--t2)",display:"flex",alignItems:"center",gap:"2px"},
        onClick:()=>doReact(m.id,em)
      },em,h("span",{},users.length));
      rxRow.appendChild(rb);
    });
    wrap.appendChild(rxRow);
  }

  // Context menu
  if(open && !m.deleted){
    const ctx = h("div",{className:"ctx-menu",style:{[own?"right":"left"]:"0",top:"100%",marginTop:"3px"}},
      ...[
        {ic:"reply",lb:t.reply,fn:()=>{S.replyTo=m;S.msgMenu=null;render();}},
        {ic:"star",lb:m.starred?t.unstar:t.starred,fn:()=>doStar(m.id)},
        {ic:"copy",lb:t.copy,fn:()=>{navigator.clipboard?.writeText(m.text);S.msgMenu=null;showToast("Copied!","📋");render();}},
        {ic:"fwd",lb:t.fwd,fn:()=>{S.fwdModal={text:m.text};S.msgMenu=null;render();}},
        ...(own?[
          {ic:"edit",lb:t.editMsg,fn:()=>{S.editMsg={id:m.id,cid:S.activeChat.id};S.editTxt=m.text;S.msgMenu=null;render();}},
          {ic:"trash",lb:t.del,fn:()=>doDeleteMsg(m.id),d:true},
        ]:[]),
      ].map(item=>{
        const btn = h("button",{className:"ditem"+(item.d?" danger":""),onClick:e=>{e.stopPropagation();item.fn();}});
        btn.appendChild(ico(item.ic,12,item.d?"#f87171":"var(--t3)"));
        btn.appendChild(document.createTextNode(" "+item.lb));
        return btn;
      })
    );
    wrap.appendChild(ctx);
  }

  return wrap;
}

/* ─── Empty State ─── */
function renderEmptyState(){
  const t = T[S.lang];
  const wrap = h("div",{className:"empty-state"});
  const logoWrap = h("div",{style:{opacity:".1",marginBottom:"14px"}});
  logoWrap.appendChild(frostLogo(70));
  wrap.appendChild(logoWrap);
  wrap.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"900",color:"var(--t2)",marginBottom:"5px",letterSpacing:"-0.5px"}},
    h("span",{style:{color:"var(--ac)"}},"Frost"),document.createTextNode("Chat")
  ));
  wrap.appendChild(h("div",{style:{fontSize:"11px",marginBottom:"8px"}},t.selectChat));
  const enc = h("div",{style:{fontSize:"9px",color:"var(--t3)",padding:"4px 14px",background:"var(--bg1)",borderRadius:"18px",border:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:"4px",marginBottom:"20px"}});
  enc.appendChild(ico("lock",10,"var(--t3)"));
  enc.appendChild(document.createTextNode(" "+t.e2e));
  wrap.appendChild(enc);

  // Real-time info card
  const rtCard = h("div",{style:{padding:"12px 16px",background:"var(--acd)",borderRadius:"14px",border:"1px solid var(--acg)",maxWidth:"280px",textAlign:"center"}});
  rtCard.appendChild(h("div",{style:{fontSize:"13px",color:"var(--ac)",fontWeight:"800",marginBottom:"6px"}},"🌐 "+t.realTime));
  rtCard.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)",lineHeight:"1.6"}},"Share this app with friends! Anyone who enters the same Firebase database can chat with you in real-time."));
  const setupBtn = h("button",{
    style:{marginTop:"10px",background:"var(--ac)",border:"none",borderRadius:"10px",padding:"7px 16px",cursor:"pointer",fontSize:"11px",fontWeight:"800",color:"#031a03",fontFamily:"'Plus Jakarta Sans',sans-serif"},
    onClick:()=>{S.setupModal=true;render();}
  },"⚡ "+t.howItWorks);
  rtCard.appendChild(setupBtn);
  wrap.appendChild(rtCard);
  return wrap;
}

/* ─── Call Screen ─── */
function renderCallScreen(){
  const t = T[S.lang];
  const c = S.callScreen;
  const wrap = h("div",{id:"call-screen"});

  const avEl = h("div",{className:"call-av"});
  const col = nameCol(c.name);
  avEl.style.background = `linear-gradient(135deg,${col},${col}99)`;
  avEl.style.fontSize = "36px";
  avEl.style.fontWeight = "900";
  avEl.style.color = "#031a03";
  avEl.textContent = c.name.slice(0,2).toUpperCase();
  const ring = h("div",{className:"call-ring"});
  const ring2 = h("div",{className:"call-ring2"});
  avEl.appendChild(ring);
  avEl.appendChild(ring2);
  wrap.appendChild(avEl);

  wrap.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"800",color:"var(--t1)",marginBottom:"6px"}},c.name));
  wrap.appendChild(h("div",{style:{fontSize:"12px",color:"var(--ac)",marginBottom:"40px",fontFamily:"'JetBrains Mono',monospace"}},`${c.type==="video"?"📹":"📞"} ${t.calling}`));

  const btns = h("div",{style:{display:"flex",gap:"20px"}});

  [
    {ic:"phone",col:"#ef4444",label:t.endCall,fn:()=>{S.callScreen=null;render();}},
  ].forEach(btn=>{
    const b = h("button",{
      style:{background:btn.col,border:"none",cursor:"pointer",width:"60px",height:"60px",borderRadius:"50%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px",transition:"transform .15s"},
      onClick:btn.fn,
    });
    b.appendChild(ico(btn.ic,22,"#fff"));
    b.appendChild(h("span",{style:{fontSize:"9px",color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:"700"}},btn.label));
    btns.appendChild(b);
  });
  wrap.appendChild(btns);
  return wrap;
}

/* ═══════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════ */
function renderGrpModal(){
  const t = T[S.lang];
  const ov = h("div",{className:"overlay",onClick:()=>{S.grpModal=false;render();}});
  const modal = h("div",{className:"modal",onClick:e=>e.stopPropagation()});

  const title = h("h3",{style:{fontSize:"15px",fontWeight:"800",color:"var(--t1)",marginBottom:"16px",display:"flex",alignItems:"center",gap:"7px"}});
  title.appendChild(ico("group",16,"var(--ac)"));
  title.appendChild(document.createTextNode(" "+t.newGroup));
  modal.appendChild(title);

  const inp = h("input",{
    className:"inp",type:"text",placeholder:t.grpName,value:S.grpName,
    style:{marginBottom:"12px"},
    onInput:e=>{S.grpName=e.target.value;},
  });
  modal.appendChild(inp);
  setTimeout(()=>inp.focus(),50);

  modal.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)",marginBottom:"7px",fontWeight:"700"}},t.addMembers+":"));

  const memberList = h("div",{style:{maxHeight:"170px",overflowY:"auto",marginBottom:"14px",display:"flex",flexDirection:"column",gap:"4px"}});
  Object.values(S.users).filter(u=>u.name!==S.user.name).forEach(u=>{

async function openChat(c){
  S.activeChat = c;
  S.msgMenu = null;
  S.chatMenu = false;
  S.replyTo = null;
  S.input = "";
  S.unread = {...S.unread, [c.id]: 0};

  // Subscribe to messages if not already
  if(!UNSUB["msgs_"+c.id]){
    UNSUB["msgs_"+c.id] = DB.onMessages(c.id, msgsMap=>{
      if(!msgsMap) return;
      const arr = Object.values(msgsMap);
      // Detect new incoming message for notification
      if(arr.length && S.messages[c.id]){
        const prev = Object.values(S.messages[c.id]).length;
        if(arr.length > prev){
          const newMsg = arr.sort((a,b)=>a.ts-b.ts)[arr.length-1];
          if(newMsg.from !== S.user.name){
            if(!document.hasFocus()) S.unread = {...S.unread, [c.id]:(S.unread[c.id]||0)+1};
            pushNotif(newMsg.from, newMsg.text);
          }
        }
      }
      S.messages = {...S.messages, [c.id]: msgsMap};
      render();
    });
  }

  // Typing indicator
  if(UNSUB.typing) { UNSUB.typing(); delete UNSUB.typing; }
  UNSUB.typing = DB.onTyping(c.id, typingMap=>{
    const others = Object.entries(typingMap||{}).filter(([n,v])=>n!==S.user.name&&v&&Date.now()-v<5000);
    S.botTyping = others.length > 0;
    render();
  });

  render();
}

function setActiveChat(c){
  if(UNSUB.msgs) { UNSUB.msgs(); delete UNSUB.msgs; }
  if(UNSUB.typing) { UNSUB.typing(); delete UNSUB.typing; }
  S.activeChat = c;
  S.msgMenu = null;
  S.chatMenu = false;
  render();
}

async function startDM(targetName){
  const ids = [S.user.name, targetName].sort();
  const cid = `dm_${ids[0]}_${ids[1]}`;
  let c = S.chats.find(x=>x.id===cid);
  if(!c){
    c = {id:cid, name:targetName, type:"dm", lastMsg:"", ts:Date.now(), members:[S.user.name, targetName]};
    S.chats = [...S.chats, c];
    await DB.saveChat(c);
  }
  S.tab = "chats";
  S.q = "";
  await openChat(c);
}

async function doSend(){
  // Read directly from textarea if available
  const ta = document.getElementById("chat-input");
  if(ta) S.input = ta.value;

  const text = S.input.trim();
  if(!text || !S.activeChat) return;

  const msg = {
    id: uid(),
    from: S.user.name,
    text,
    ts: Date.now(),
    type: "text",
    replyTo: S.replyTo ? {id:S.replyTo.id, from:S.replyTo.from, text:S.replyTo.text} : null,
    starred: false,
    reactions: {},
    deleted: false,
    edited: false,
  };

  // Clear input immediately
  S.input = "";
  if(ta){ ta.value=""; ta.style.height="auto"; }
  S.replyTo = null;
  S.emojiOpen = false;
  sendTypingIndicator(false);

  // Update send button immediately
  const sb = document.getElementById("send-btn");
  if(sb){ sb.style.background="var(--bg3)"; sb.style.color="var(--t3)"; }

  await DB.sendMessage(S.activeChat.id, msg);
}

async function commitEdit(){
  if(!S.editMsg || !S.editTxt.trim()) return;
  await DB.updateMessage(S.editMsg.cid, S.editMsg.id, {text:S.editTxt.trim(), edited:true});
  S.editMsg = null; S.editTxt = "";
  render();
}

async function doDeleteMsg(msgId){
  await DB.updateMessage(S.activeChat.id, msgId, {deleted:true, text:""});
  S.msgMenu = null;
  render();
}

async function doStar(msgId){
  const cid = S.activeChat.id;
  const msg = (S.messages[cid]||{})[msgId];
  if(!msg) return;
  await DB.updateMessage(cid, msgId, {starred:!msg.starred});
  S.msgMenu = null;
  render();
}

async function doReact(msgId, emoji){
  const cid = S.activeChat.id;
  const msg = Object.values(S.messages[cid]||{}).find(m=>m.id===msgId);
  if(!msg) return;
  const r = {...(msg.reactions||{})};
  if(!r[emoji]) r[emoji]=[];
  r[emoji] = r[emoji].includes(S.user.name)
    ? r[emoji].filter(n=>n!==S.user.name)
    : [...r[emoji], S.user.name];
  if(r[emoji].length===0) delete r[emoji];
  await DB.updateMessage(cid, msgId, {reactions:r});
  render();
}

  const msg = {
    id:uid(), from:S.user.name, text:`↩️ ${text}`,

let recInterval = null;
function startRec(){ S.rec=true; S.recSec=0; recInterval=setInterval(()=>{S.recSec++;render();},1000); render(); }
function stopRec(){ clearInterval(recInterval); S.rec=false; if(S.recSec>0) doSend_voice(); S.recSec=0; render(); }
async function doSend_voice(){
  const text = `🎤 Voice message (${S.recSec}s)`;
  const msg = {id:uid(),from:S.user.name,text,ts:Date.now(),type:"voice",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
  if(S.activeChat) await DB.sendMessage(S.activeChat.id, msg);
}

function sendTypingIndicator(isTyping){
  if(!S.activeChat) return;
  clearTimeout(typingTimer);
  DB.setTyping(S.activeChat.id, S.user.name, isTyping);
  if(isTyping) typingTimer = setTimeout(()=>DB.setTyping(S.activeChat.id, S.user.name, false), 3000);
}

function togglePin(cid){ S.pinned=S.pinned.includes(cid)?S.pinned.filter(i=>i!==cid):[...S.pinned,cid]; localStorage.setItem("fc_pinned",JSON.stringify(S.pinned)); }
function toggleMute(cid){ S.muted=S.muted.includes(cid)?S.muted.filter(i=>i!==cid):[...S.muted,cid]; localStorage.setItem("fc_muted",JSON.stringify(S.muted)); }
function clearChat(cid){ /* In Firebase we'd mark all as deleted — for now clear local display */ S.messages={...S.messages,[cid]:{}}; }
function deleteChat(cid){ S.chats=S.chats.filter(c=>c.id!==cid); S.activeChat=null; DB.saveChat({id:cid,deleted:true,members:[]}); }

function shareApp(){
  const url = window.location.href;
  navigator.clipboard?.writeText(url);
  showToast(T[S.lang].copiedLink,"🔗");
}
function shareChat(c){

  showToast(T[S.lang].copiedLink,"🔗");

function doLogout(){
  if(S.user) DB.setUser(S.user.name,{...S.user,online:false,lastSeen:Date.now()});
  unsubAll();
  S.user=null; S.activeChat=null; S.chats=[]; S.users={}; S.messages={};
  localStorage.removeItem("fc_user");
  render();
}

function boot(){
  window.__appRender = render;
  render();
  if(S.user){
    const name = S.user.name;
    DB.setUser(name,{...S.user,online:true,lastSeen:Date.now()});
    DB.setupPresence(name);
    UNSUB.users = DB.onUsers(u=>{S.users=u;render();});
    UNSUB.chats = DB.onChats(c=>{
      const myChats = Object.values(c||{}).filter(ch=>ch.members?.includes(name));
      S.chats = myChats;
      // Auto-subscribe to all chat messages for persistence
      myChats.forEach(ch=>{
        if(!UNSUB["msgs_"+ch.id]){
          UNSUB["msgs_"+ch.id] = DB.onMessages(ch.id, msgsMap=>{
            if(msgsMap && Object.keys(msgsMap).length > 0){
              S.messages = {...S.messages, [ch.id]: msgsMap};
            }
            render();
          });
        }
      });
      render();
    });
  }
}

window.__appRender = render;
boot();
</script>
</body>
