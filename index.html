<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visitor Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Enter Your Name</h2>
    <input type="text" id="nameInput" placeholder="Your name">
    <br>
    <button onclick="submitName()">Submit</button>
    <div id="message"></div>
</div>

<script>
    function submitName() {
        var name = document.getElementById("nameInput").value.trim();
        if (name !== "") {
            document.getElementById("message").innerText = "Thank you for participating.";
        }
    }
</script>

</body>
</html>
