<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#05101f"/>
<meta name="apple-mobile-web-app-title" content="FrostChat"/>
<meta name="description" content="FrostChat — Real-time messaging"/>
<title>FrostChat ❄️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>

/* ==========================================
   FROSTCHAT - ORIGINAL DESIGN
========================================== */
:root{--sidebar-w:320px;--bg0:#05101f;--bg1:#091525;--bg2:#0e1d30;--bg3:#13253b;--bg4:#192e47;--ac:#38bdf8;--ac2:#0ea5e9;--acg:rgba(56,189,248,.14);--acd:rgba(56,189,248,.07);--t1:#dff0fc;--t2:#7da5c4;--t3:#3b5878;--bd:rgba(56,189,248,.08);--bd2:rgba(56,189,248,.15);--sh:0 12px 48px rgba(0,0,0,.8);--r:14px}
.light{--bg0:#e8f4fd;--bg1:#f4faff;--bg2:#ddeef9;--bg3:#cce3f2;--bg4:#b8d5ea;--ac:#0284c7;--ac2:#0369a1;--acg:rgba(2,132,199,.12);--acd:rgba(2,132,199,.06);--t1:#082030;--t2:#2d5070;--t3:#6893b5;--bd:rgba(2,132,199,.1);--bd2:rgba(2,132,199,.2);--sh:0 4px 24px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;background:var(--bg0);color:var(--t1);height:100dvh;overflow:hidden;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

#app{display:flex;height:100dvh;overflow:hidden;width:100%;background:var(--bg0)}
#sidebar{width:var(--sidebar-w);min-width:300px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100%}
#sidebar.hidden{display:none}
#chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}

.s-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--bd);background:var(--bg1);flex-shrink:0}
.chat-row{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;transition:background .15s;position:relative;border-left:3px solid transparent}
.chat-row:hover{background:var(--bg2)}
.chat-row.active{background:var(--acg);border-left-color:var(--ac)}
.chat-item{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;transition:background .15s;position:relative;border-left:3px solid transparent}
.chat-item:hover{background:var(--bg2)}
.chat-item.active{background:var(--acg);border-left-color:var(--ac)}
.chat-item.pinned::after{content:'📌';position:absolute;top:8px;right:10px;font-size:9px;opacity:.5}
.chat-item.muted{opacity:.55}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.ci-last{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.unread{background:var(--ac);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}

.tab-bar{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg1)}

.search-wrap{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;position:relative}
.search-inp{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:8px 12px 8px 34px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none;transition:all .2s}
.search-inp:focus{border-color:var(--ac)}
.search-icon{position:absolute;left:19px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:13px}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;position:relative;font-family:'Plus Jakarta Sans',sans-serif}
.av-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:#38bdf8;border-radius:50%;border:2px solid var(--bg1);box-shadow:0 0 6px rgba(56,189,248,.5)}

.chat-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--bg1);flex-shrink:0}
.chat-hdr-info{flex:1;min-width:0}
.chat-hdr-name{font-size:14px;font-weight:800;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-hdr-sub{font-size:10px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin-top:1px}
.chat-hdr-sub.offline{color:var(--t3)}

#msgs-area{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:2px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .18s ease}
.msg-row.own{flex-direction:row-reverse}
.bubble{padding:9px 13px;border-radius:18px;max-width:min(320px,75vw);min-width:60px;font-size:13px;line-height:1.5;word-break:break-word;position:relative;cursor:pointer;transition:filter .15s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.bubble:hover{filter:brightness(1.08)}
.msg-row.own .bubble,.bubble.own{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border-bottom-right-radius:4px}
.msg-row:not(.own) .bubble,.bubble.other{background:var(--bg3);color:var(--t1);border-bottom-left-radius:4px}
.msg-row.you-msg .bubble,.bubble.you-msg{background:linear-gradient(135deg,#1d4ed8,#1e40af)!important;color:#eff6ff!important;border-bottom-left-radius:4px!important;border-bottom-right-radius:18px!important}
.bubble-footer{display:flex;align-items:center;gap:3px;margin-top:3px;justify-content:flex-end}
.bubble-footer span{font-size:9px;opacity:.55;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.date-sep{text-align:center;margin:10px 0;display:flex;align-items:center;gap:8px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--bd2)}
.date-sep span{font-size:9px;color:var(--t3);background:var(--bg0);padding:2px 10px;border-radius:20px;border:1px solid var(--bd2);font-family:'JetBrains Mono',monospace}
.reply-in-bubble{background:rgba(0,0,0,.2);border-left:3px solid rgba(255,255,255,.35);border-radius:8px;padding:4px 8px;margin-bottom:5px;font-size:10px;opacity:.8}
.reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rxn{background:var(--bg4);border:1px solid var(--bd2);border-radius:20px;padding:2px 7px;font-size:11px;cursor:pointer;transition:all .15s}
.rxn:hover{background:var(--acg);border-color:var(--ac)}

.ibar{display:flex;align-items:flex-end;gap:7px;padding:10px 14px;border-top:1px solid var(--bd);background:var(--bg1);flex-shrink:0}
.msg-inp{flex:1;background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:10px 13px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;resize:none;outline:none;max-height:120px;min-height:40px;line-height:1.5;transition:border-color .2s}
.msg-inp:focus{border-color:var(--ac)}
.msg-inp::placeholder{color:var(--t3)}
.ib{background:transparent;border:none;cursor:pointer;padding:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s;flex-shrink:0}
.ib:hover{background:var(--bg2);color:var(--t1)}
#send-btn{width:40px;height:40px;background:var(--acg);border:1px solid var(--ac);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac);transition:all .2s;flex-shrink:0}
#send-btn:hover,#send-btn.active{background:var(--ac);color:#fff;box-shadow:0 0 20px rgba(56,189,248,.3)}
.reply-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg2);border-top:1px solid var(--bd);border-left:3px solid var(--ac);flex-shrink:0}

.empty-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--t3);background:var(--bg0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);padding:16px;animation:fadeIn .15s}
.modal{background:var(--bg1);border:1px solid var(--bd2);border-radius:24px;padding:24px;width:min(420px,100%);max-height:85vh;overflow-y:auto;box-shadow:var(--sh);animation:slideUp .2s ease}

.btn{width:100%;padding:11px 20px;border-radius:var(--r);border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 16px rgba(56,189,248,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(56,189,248,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}

.inp{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:11px 14px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;transition:all .2s;display:block}
.inp:focus{border-color:var(--ac);background:var(--bg3);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
.inp::placeholder{color:var(--t3)}

.dropdown{position:absolute;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:6px;min-width:160px;box-shadow:var(--sh);z-index:500;animation:fadeIn .1s}
.ditem{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;background:transparent;border:none;border-radius:10px;color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s}
.ditem:hover{background:var(--bg3);color:var(--t1)}
.ditem.danger{color:#f87171}.ditem.danger:hover{background:rgba(239,68,68,.1)}

.vip-badge{display:inline-flex;align-items:center;border-radius:6px;padding:1px 5px;font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;flex-shrink:0}
.lead-tag{background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(245,158,11,.12));color:#f59e0b;border:1px solid rgba(245,158,11,.4);border-radius:6px;padding:1px 6px;font-size:9px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;box-shadow:0 0 8px rgba(245,158,11,.3);text-shadow:0 0 6px rgba(245,158,11,.6)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd2);border-radius:24px;padding:10px 20px;font-size:12px;font-weight:700;color:var(--t1);z-index:2000;white-space:nowrap;display:flex;align-items:center;gap:8px;box-shadow:var(--sh);animation:toastIn .3s ease;pointer-events:none}

.stories-bar{display:none!important;/*gap:12px;padding:9px 12px;overflow-x:auto;border-bottom:1px solid var(--bd);background:var(--bg1);flex-shrink:0;scrollbar-width:none}
*/.story-av{display:none;/*border-radius:50%;background:linear-gradient(135deg,var(--ac),#60a5fa);cursor:pointer}
.story-av.seen{background:var(--bg4)}
.story-name{font-size:9px;color:var(--t2);font-weight:700;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

.people-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s;border-radius:12px;margin:2px 8px}
.people-item:hover{background:var(--bg2)}

.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.setting-row:hover{background:var(--bg2)}
.setting-label{font-size:13px;font-weight:600;color:var(--t1)}
.setting-sub{font-size:10px;color:var(--t3);margin-top:1px}
.setting-row-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.setting-row-item:hover{background:var(--bg2)}

#conn-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,.92);color:#fff;border-radius:20px;padding:5px 14px;font-size:10px;font-weight:800;z-index:9999;display:none;gap:6px;align-items:center;backdrop-filter:blur(8px)}

.typing-dots{display:flex;gap:3px;align-items:center;padding:6px 10px}
.typing-dots span{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto}
.emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px;transition:transform .1s;line-height:1}
.emoji-btn:hover{transform:scale(1.3);background:var(--bg3)}

@media(max-width:700px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .3s;width:100vw;min-width:0}
  #sidebar.open{transform:translateX(0)}
  #chat-panel{width:100%}
  .bubble{max-width:82vw}
  :root{--sidebar-w:100vw}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none;backdrop-filter:blur(2px)}
  .sidebar-overlay.show{display:block}
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.highlight{background:rgba(34,197,94,.28);border-radius:3px;padding:0 2px}
.rec-active{color:#f87171;animation:pulse 1.2s infinite}



/* --- ICE BLUE EXTRA STYLES --- */
.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg1);padding:3px 6px;gap:2px}
.tab{flex:1;padding:7px 4px;background:transparent;border:none;border-radius:10px;color:var(--t3);font-family:'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:4px}
.tab:hover{background:var(--acd);color:var(--t2)}
.tab.active{background:var(--acg);color:var(--ac);box-shadow:inset 0 0 0 1px var(--bd2)}
.unread-badge{background:var(--ac);color:var(--bg0);font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.status-dot{display:inline-block;width:6px;height:6px;background:var(--ac);border-radius:50%;box-shadow:0 0 5px rgba(56,189,248,.55)}
.msg-input{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:10px 13px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;resize:none;outline:none;max-height:120px;min-height:40px;line-height:1.5;transition:border-color .2s}
.msg-input:focus{border-color:rgba(56,189,248,.4)}
.msg-input::placeholder{color:var(--t3)}
.send-btn{width:40px;height:40px;background:var(--acg);border:1px solid var(--ac);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac);transition:all .2s;flex-shrink:0}
.send-btn:hover{background:var(--ac);color:#fff;box-shadow:0 0 16px rgba(56,189,248,.3)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 10% 10%,rgba(56,189,248,.05),transparent 65%),radial-gradient(ellipse 45% 35% at 90% 90%,rgba(14,165,233,.03),transparent 65%)}
#app,#root{position:relative;z-index:1}

/* ══════════════════════════════════════
   FROSTCHAT v8 — NEW FEATURES CSS
══════════════════════════════════════ */

/* --- PROFILE PAGE --- */
.prof-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s;padding:0}
.prof-sheet{background:var(--bg1);border-radius:24px 24px 0 0;width:min(480px,100%);max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;padding-bottom:env(safe-area-inset-bottom,0)}
.prof-banner{height:110px;background:linear-gradient(135deg,var(--bg3),var(--bg4));position:relative;border-radius:24px 24px 0 0;overflow:hidden;flex-shrink:0}
.prof-banner-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(56,189,248,.18),transparent 70%)}
.prof-av-wrap{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);z-index:2}
.prof-av-ring{padding:3px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#60a5fa);box-shadow:0 0 24px rgba(56,189,248,.4)}
.prof-body{padding:42px 22px 22px;text-align:center}
.prof-name{font-size:20px;font-weight:900;color:var(--t1);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.prof-status-txt{font-size:11px;color:var(--t3);margin:4px 0 10px;font-style:italic}
.prof-online-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);border-radius:14px;overflow:hidden;margin:14px 0}
.prof-stat{background:var(--bg2);padding:12px 6px;text-align:center}
.prof-stat-v{font-size:17px;font-weight:900;color:var(--t1)}
.prof-stat-l{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.prof-media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:12px;overflow:hidden}
.prof-media-thumb{aspect-ratio:1;background:var(--bg3);overflow:hidden;cursor:pointer}
.prof-media-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.prof-media-thumb:hover img{transform:scale(1.05)}

/* --- IMAGE VIEWER --- */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:4000;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .15s}
.img-viewer img{max-width:96vw;max-height:82vh;border-radius:10px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.9)}
.img-viewer-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(rgba(0,0,0,.7),transparent)}
.img-viewer-actions{position:absolute;bottom:30px;display:flex;gap:10px}
.img-viewer-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px}
.img-viewer-btn:hover{background:rgba(255,255,255,.22)}
.img-bubble-wrap{max-width:240px;border-radius:14px;overflow:hidden;cursor:pointer;background:var(--bg4);position:relative}
.img-bubble-wrap img{width:100%;display:block;max-height:200px;object-fit:cover;transition:filter .2s}
.img-bubble-wrap:hover img{filter:brightness(.85)}
.img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;display:flex;align-items:center;justify-content:center}
.img-bubble-wrap:hover .img-overlay{background:rgba(0,0,0,.25)}

/* --- SWIPE TO REPLY --- */
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);opacity:0;font-size:16px;transition:opacity .15s;pointer-events:none;z-index:10}
.swipe-hint.left{left:-28px}
.swipe-hint.right{right:-28px}
.bubble-wrap{transition:transform .15s;position:relative}
.bubble-wrap.swiping{transition:none}

/* --- VOICE PLAYER --- */
.voice-player{display:flex;align-items:center;gap:10px;min-width:190px;padding:2px 0}
.vp-btn{background:rgba(255,255,255,.18);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.vp-btn:hover{transform:scale(1.1)}
.vp-btn.playing{background:rgba(255,255,255,.3)}
.vp-waves{display:flex;gap:2px;align-items:center;height:26px;flex:1}
.vp-bar{width:3px;background:rgba(255,255,255,.45);border-radius:2px;transition:height .08s,opacity .2s}
.vp-bar.active{background:var(--ac)}
.vp-info{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
.vp-dur{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.7)}
.vp-label{font-size:9px;color:rgba(255,255,255,.4)}

/* --- EXTENDED REACTIONS --- */
.rxn-row{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.rxn-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:2px 8px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:3px;transition:all .15s}
.rxn-chip:hover,.rxn-chip.mine{background:var(--acg);border-color:var(--ac)}
.rxn-chip span{font-size:10px;color:var(--t2);font-weight:700}
.rxn-picker-wrap{position:absolute;z-index:600;animation:fadeIn .12s}
.rxn-picker{background:var(--bg2);border:1px solid var(--bd2);border-radius:40px;padding:6px 10px;display:flex;gap:3px;box-shadow:var(--sh)}
.rxn-pick-btn{font-size:22px;cursor:pointer;border:none;background:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .1s;line-height:1}
.rxn-pick-btn:hover{transform:scale(1.35);background:var(--bg3)}

/* --- LINK PREVIEW --- */
.link-prev{display:block;background:var(--bg4);border:1px solid var(--bd2);border-left:3px solid var(--ac);border-radius:10px;padding:8px 10px;margin-top:6px;text-decoration:none;cursor:pointer;transition:all .15s}
.link-prev:hover{border-color:var(--ac)}
.link-prev-domain{font-size:9px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin-bottom:2px;font-weight:700}
.link-prev-url{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* --- CODE BLOCK --- */
.code-block{background:rgba(0,0,0,.45);border:1px solid var(--bd2);border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre-wrap;overflow-x:auto;margin:5px 0;line-height:1.65;color:#e2e8f0}

/* --- USER STRIP (sidebar top) --- */
.user-strip{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);background:linear-gradient(135deg,var(--bg1),var(--bg2));cursor:pointer;flex-shrink:0;transition:background .15s}
.user-strip:hover{background:var(--bg2)}
.user-strip-info{flex:1;min-width:0}
.user-strip-name{font-size:13px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:5px}
.user-strip-sub{font-size:9px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* --- COMPOSE FAB --- */
.compose-btn{width:34px;height:34px;border-radius:50%;background:var(--acg);border:1px solid var(--ac);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all .2s;flex-shrink:0}
.compose-btn:hover{background:var(--ac);color:#fff;box-shadow:0 0 14px rgba(56,189,248,.35)}

/* --- EMPTY STATE --- */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center;gap:8px}
.empty-icon{font-size:54px;animation:floatY 3s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.grad-txt{background:linear-gradient(135deg,var(--ac),#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* --- TIPS CARD --- */
.tips-card{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;padding:14px 16px;max-width:260px;width:100%;margin-top:14px;text-align:left}
.tips-title{font-size:9px;color:var(--ac);font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:10px;letter-spacing:.5px}
.tip-row{font-size:11px;color:var(--t2);margin-bottom:5px;display:flex;align-items:flex-start;gap:6px;line-height:1.4}

/* --- IMAGE SEND BUTTON --- */
.img-send-btn{background:transparent;border:none;cursor:pointer;padding:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s;flex-shrink:0;font-size:20px}
.img-send-btn:hover{background:var(--bg2);color:var(--ac)}

/* --- MENTIONS --- */
.mention{color:var(--ac);font-weight:700;cursor:pointer}
.mention:hover{text-decoration:underline}

/* --- SAFE AREA BOTTOM --- */
.ibar{padding-bottom:max(10px,env(safe-area-inset-bottom,0px))!important}

/* --- PWA INSTALL BANNER --- */
.pwa-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(14,165,233,.06));border-bottom:1px solid var(--bd);flex-shrink:0;cursor:pointer;transition:background .2s}
.pwa-banner:hover{background:var(--acg)}
.pwa-banner-txt{flex:1}
.pwa-banner-title{font-size:12px;font-weight:800;color:var(--t1)}
.pwa-banner-sub{font-size:9px;color:var(--t3)}

/* --- ANIMATIONS --- */
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
@keyframes callPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
@keyframes waveAnim{0%,100%{height:4px}50%{height:18px}}


/* ═══════════════════════════════════════════════════
   FROSTCHAT v9 — PREMIUM ANIMATIONS & EFFECTS
═══════════════════════════════════════════════════ */

/* ── Message entrance ── */
@keyframes msgSlideIn{
  from{opacity:0;transform:translateY(10px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes msgSlideInLeft{
  from{opacity:0;transform:translateX(-14px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes msgSlideInRight{
  from{opacity:0;transform:translateX(14px)}
  to{opacity:1;transform:translateX(0)}
}

/* ── Bubble hover lift ── */
.bubble{transition:filter .15s, box-shadow .2s, transform .15s !important}
.bubble:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25) !important}

/* ── Reaction burst ── */
@keyframes rxnBurst{
  0%{transform:scale(0) rotate(-20deg);opacity:0}
  60%{transform:scale(1.3) rotate(5deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
.rxn-chip{animation:rxnBurst .3s cubic-bezier(.34,1.56,.64,1) both}

/* ── Toast slide + glow ── */
@keyframes toastSlideUp{
  from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.93)}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
.toast{animation:toastSlideUp .35s cubic-bezier(.34,1.56,.64,1) !important;
  backdrop-filter:blur(12px) !important;
  background:linear-gradient(135deg,var(--bg3),var(--bg4)) !important;
  border:1px solid var(--bd2) !important;
  box-shadow:0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(56,189,248,.15) !important}

/* ── Modal entrance ── */
@keyframes modalPop{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.modal{animation:modalPop .28s cubic-bezier(.34,1.56,.64,1) !important}

/* ── Profile sheet ── */
@keyframes sheetUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
.prof-sheet{animation:sheetUp .32s cubic-bezier(.22,1,.36,1) !important}

/* ── Sidebar items ── */
.chat-item{transition:background .15s, border-color .2s, transform .1s !important}
.chat-item:active{transform:scale(.98)}
.people-item{transition:background .15s, transform .1s !important}
.people-item:active{transform:scale(.98)}

/* ── Buttons ── */
.btn{transition:all .2s cubic-bezier(.34,1.56,.64,1) !important}
.btn:active{transform:scale(.96) !important}
.ib{transition:all .15s, transform .1s !important}
.ib:active{transform:scale(.88)}

/* ── Send button pulse on send ── */
@keyframes sendPulse{
  0%{transform:scale(1)}
  30%{transform:scale(1.2)}
  70%{transform:scale(.93)}
  100%{transform:scale(1)}
}
.send-anim{animation:sendPulse .35s ease !important}

/* ── Typing dots enhanced ── */
@keyframes typingBounce{
  0%,80%,100%{transform:translateY(0) scale(1);opacity:.4}
  40%{transform:translateY(-6px) scale(1.1);opacity:1}
}
.typing-dots span{animation:typingBounce 1.4s infinite !important}
.typing-dots span:nth-child(2){animation-delay:.16s !important}
.typing-dots span:nth-child(3){animation-delay:.32s !important}

/* ── Online dot pulse ── */
@keyframes onlinePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.5)}
  50%{box-shadow:0 0 0 4px rgba(56,189,248,0)}
}
.av-dot{animation:onlinePulse 2.5s infinite !important}
.status-dot{animation:onlinePulse 2.5s infinite !important}

/* Stories disabled */

/* ── Tab bar active indicator ── */
.tab{position:relative;overflow:hidden}
.tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--ac);border-radius:2px;transition:width .25s cubic-bezier(.34,1.56,.64,1)}
.tab.active::after{width:60%}

/* ── Header glow on scroll ── */
.chat-hdr{transition:box-shadow .3s}
.chat-hdr.scrolled{box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* ── Input focus glow ── */
.msg-inp,.inp{transition:all .2s, box-shadow .25s !important}
.msg-inp:focus,.inp:focus{
  box-shadow:0 0 0 3px rgba(56,189,248,.14), 0 2px 12px rgba(56,189,248,.1) !important;
  border-color:var(--ac) !important}

/* ── Avatar ring on hover ── */
.av{transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s}
.av:hover{transform:scale(1.08);box-shadow:0 0 0 2px var(--ac)}

/* ── Unread badge pop ── */
@keyframes badgePop{
  0%{transform:scale(0)}
  70%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.unread-badge,.unread{animation:badgePop .4s cubic-bezier(.34,1.56,.64,1)}

/* ── New message glow (own) ── */
.msg-row.own .bubble,.bubble.own{
  background:linear-gradient(135deg,#0ea5e9,#0284c7) !important;
  box-shadow:0 4px 16px rgba(14,165,233,.3), 0 1px 3px rgba(0,0,0,.2) !important}

/* ── Waveform bars ── */
.vp-bar.active{
  background:linear-gradient(180deg,var(--ac),#60a5fa) !important;
  box-shadow:0 0 6px rgba(56,189,248,.4)}

/* ── Login card entrance ── */
@keyframes loginFloat{
  from{opacity:0;transform:translateY(30px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── Sidebar open ── */
@keyframes sidebarSlide{
  from{transform:translateX(-100%);opacity:.5}
  to{transform:translateX(0);opacity:1}
}
#sidebar.open{animation:sidebarSlide .28s cubic-bezier(.22,1,.36,1) !important}

/* ── Chat panel ── */
@keyframes panelFade{
  from{opacity:0;transform:translateX(10px)}
  to{opacity:1;transform:translateX(0)}
}
#chat-panel > div{animation:panelFade .25s ease}

/* ── Overlay backdrop ── */
.overlay{backdrop-filter:blur(8px) saturate(1.2) !important;
  background:rgba(0,0,0,.65) !important}

/* ── Call screen ── */
@keyframes callRing{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}
.call-avatar-anim{animation:callRing 1.5s ease-in-out infinite}

/* ── Emoji grid ── */
.emoji-btn{transition:transform .12s cubic-bezier(.34,1.56,.64,1) !important}
.emoji-btn:hover{transform:scale(1.35) !important}

/* ── Dropdown ── */
.dropdown{animation:modalPop .2s cubic-bezier(.34,1.56,.64,1) !important;
  backdrop-filter:blur(6px)}

/* ── Scroll to bottom FAB ── */
@keyframes fabBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
.scroll-fab{animation:fabBounce 2s ease-in-out infinite}

/* ── PROFILE PIC RING (custom avatar) ── */
.av-custom{object-fit:cover;border-radius:50%;width:100%;height:100%}
.av-ring-anim{
  background:conic-gradient(var(--ac) 0deg, #60a5fa 90deg, #a78bfa 180deg, var(--ac) 360deg);
  animation:spin 4s linear infinite;
  padding:2.5px;border-radius:50%;display:inline-flex}

/* ── THEME COLORS (extended) ── */
[data-theme="ocean"]{--ac:#06b6d4;--ac2:#0891b2;--bg0:#030d14;--bg1:#051520;--bg2:#082030;--bg3:#0c2a3f;--bg4:#10354f}
[data-theme="violet"]{--ac:#a78bfa;--ac2:#8b5cf6;--bg0:#0d0814;--bg1:#140f20;--bg2:#1c1530;--bg3:#251c3d;--bg4:#2e234a}
[data-theme="rose"]{--ac:#fb7185;--ac2:#f43f5e;--bg0:#140810;--bg1:#1f0e18;--bg2:#2a1422;--bg3:#351a2b;--bg4:#3f2034}
[data-theme="emerald"]{--ac:#34d399;--ac2:#10b981;--bg0:#040d0a;--bg1:#071510;--bg2:#0b1e16;--bg3:#0f271c;--bg4:#133023}
[data-theme="amber"]{--ac:#fbbf24;--ac2:#f59e0b;--bg0:#100c02;--bg1:#1a1305;--bg2:#241b08;--bg3:#2e230b;--bg4:#382b0d}

/* ── Notification permission card ── */
.notif-card{background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(14,165,233,.06));border:1px solid rgba(56,189,248,.25);border-radius:16px;padding:14px;margin:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.notif-card:hover{background:var(--acg);border-color:var(--ac)}

/* ── AVATAR UPLOAD ── */
.av-upload-ring{position:relative;display:inline-flex;cursor:pointer}
.av-upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:18px}
.av-upload-ring:hover .av-upload-overlay{opacity:1}

/* ── THEME PICKER ── */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.theme-swatch{border-radius:14px;padding:12px 8px;cursor:pointer;border:2px solid transparent;transition:all .2s;text-align:center;font-size:10px;font-weight:700}
.theme-swatch.active{border-color:var(--ac);box-shadow:0 0 12px rgba(56,189,248,.3)}
.theme-swatch:hover{transform:scale(1.04)}

/* ── SCROLL TO BOTTOM BUTTON ── */
.scroll-to-bottom{position:absolute;bottom:70px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh);transition:all .2s;z-index:10;font-size:16px}
.scroll-to-bottom:hover{background:var(--ac);border-color:var(--ac);transform:scale(1.1)}
.scroll-to-bottom.has-unread{background:var(--ac);color:#fff}

/* ── PARTICLES BG ── */
#fc-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(56,189,248,.4);animation:particleFly linear infinite}
@keyframes particleFly{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:.5}
  90%{opacity:.3}
  100%{transform:translateY(-10px) translateX(var(--dx,0px));opacity:0}
}


/* ══════════════════════════════════════════
   OWNER & VIP BADGE SYSTEM
══════════════════════════════════════════ */

/* LEAD — حصرياً للمالك simo511 */
.owner-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:linear-gradient(135deg,#1a0800,#3d1a00);
  color:#f59e0b;
  border:1px solid rgba(245,158,11,.6);
  border-radius:6px;padding:2px 7px;
  font-size:9px;font-weight:900;
  font-family:'JetBrains Mono',monospace;letter-spacing:.6px;
  box-shadow:0 0 10px rgba(245,158,11,.4), inset 0 0 8px rgba(245,158,11,.08);
  text-shadow:0 0 8px rgba(245,158,11,.8);
  position:relative;overflow:hidden;flex-shrink:0;
}
.owner-badge::before{

}
@keyframes ownerShimmer{
  0%{transform:translateX(-100%)}

}
.owner-badge .crown{font-size:10px;filter:drop-shadow(0 0 4px rgba(245,158,11,.9))}

/* VIP — للمستخدمين العاديين */
.vip-badge-new{
  display:inline-flex;align-items:center;gap:3px;
  border-radius:6px;padding:1px 6px;
  font-size:9px;font-weight:900;
  font-family:'JetBrains Mono',monospace;letter-spacing:.4px;
  flex-shrink:0;
}

/* VIP tiers */
.vip-gold{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.1));color:#fbbf24;border:1px solid rgba(245,158,11,.45)}
.vip-blue{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(59,130,246,.1));color:#60a5fa;border:1px solid rgba(59,130,246,.4)}

.vip-red{background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.1));color:#f87171;border:1px solid rgba(239,68,68,.4)}

/* BAN indicator */
.ban-chip{display:inline-flex;align-items:center;gap:3px;background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace}

/* Admin Panel — owner gold theme */
.admin-wrap{position:fixed;inset:0;background:var(--bg0);z-index:3000;display:flex;flex-direction:column;overflow:hidden}
.admin-hdr{background:linear-gradient(135deg,#0d0600,#1a0a00,#0d0600);border-bottom:1px solid rgba(245,158,11,.3);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}

.admin-tab-bar{display:flex;background:var(--bg1);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.admin-tab{flex:1;min-width:60px;padding:10px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;font-size:10px;font-weight:800;transition:all .2s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif}
.admin-tab.active{border-bottom-color:#f59e0b;color:#f59e0b}
.admin-tab:hover:not(.active){color:var(--t2);background:var(--bg2)}

/* VIP Grant modal */
.vip-grant-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.vip-option{border-radius:12px;padding:12px 10px;cursor:pointer;border:2px solid transparent;transition:all .2s;text-align:center}
.vip-option:hover,.vip-option.sel{border-color:var(--ac);transform:scale(1.03)}

/* User card in admin */
.admin-user-card{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:10px;transition:border-color .2s}
.admin-user-card.online{border-color:rgba(56,189,248,.3)}
.admin-user-card.banned{border-color:rgba(239,68,68,.3);opacity:.8}

/* --- HIGHLIGHT FIX --- */
.highlight{background:rgba(56,189,248,.28)!important;border-radius:3px;padding:0 2px;color:var(--t1)!important}

/* ══════════════════════════════════════
   DESIGN FIXES v9.2
══════════════════════════════════════ */
.msg-row.own .bubble,.bubble.own{background:linear-gradient(135deg,#0ea5e9,#0284c7)!important;color:#fff!important;border-radius:18px 18px 4px 18px!important;box-shadow:0 4px 16px rgba(14,165,233,.3)!important}
.msg-row:not(.own) .bubble,.bubble.other{background:var(--bg3)!important;color:var(--t1)!important;border-radius:18px 18px 18px 4px!important;box-shadow:0 2px 8px rgba(0,0,0,.2)!important}

.chat-hdr{background:linear-gradient(135deg,var(--bg1),var(--bg2))!important}
.s-hdr{background:linear-gradient(135deg,var(--bg1),var(--bg2))!important}

.bubble{min-width:70px!important}


/* ══════════════════════════════════════════════════════
   FROSTCHAT PREMIUM DESIGN — COMPLETE OVERRIDE

/* ==========================================
   FIREBASE REST API
========================================== */
(function(){
  var B="https://frostchat-whithout-number-default-rtdb.firebaseio.com",L={};
  function url(p){return B+"/"+p.replace(/^\/+/,"")+".json";}
  // Block .info paths — not supported in REST API
  function safeGet(p){if(p&&p.indexOf(".info")!==-1)return Promise.resolve(null);return get(p);}
  async function get(p){try{var r=await fetch(url(p));return r.ok?await r.json():null;}catch(e){return null;}}
  async function set(p,v){try{await fetch(url(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function upd(p,v){try{await fetch(url(p),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function del(p){try{await fetch(url(p),{method:"DELETE"});}catch(e){}}
  function listen(p,cb){
    if(!L[p]){L[p]={cbs:[],last:undefined,t:null};
      var poll=async function(){if(p&&p.indexOf(".info")!==-1)return;var d=await get(p),h=JSON.stringify(d);if(h!==L[p].last){L[p].last=h;L[p].cbs.forEach(function(f){f(d);});}};
      poll();L[p].t=setInterval(poll,2000);}
    L[p].cbs.push(cb);
    return function(){if(!L[p])return;L[p].cbs=L[p].cbs.filter(function(f){return f!==cb;});if(!L[p].cbs.length){clearInterval(L[p].t);delete L[p];}};}
  function ref(p){return{_path:p,
    set:function(v){return set(p,v);},update:function(v){return upd(p,v);},remove:function(){return del(p);},
    once:function(){return get(p).then(function(v){return{val:function(){return v;}};});},
    on:function(e,cb){listen(p,function(d){cb({val:function(){return d;}});});},
    off:function(){if(L[p]){clearInterval(L[p].t);delete L[p];}},
    onDisconnect:function(){return{set:function(v){window.addEventListener("beforeunload",function(){navigator.sendBeacon(url(p),JSON.stringify(v));});}};}
  };}
  // Use a simple fetch to check connectivity instead of .info
  fetch(B+"/.json?shallow=true",{method:"GET"}).then(function(r){
    window.__fbConnected=r.ok||r.status===401||r.status===403;
    var b=document.getElementById("conn-badge");
    if(b){b.style.display=window.__fbConnected?"none":"flex";}
    if(window.__appRender)window.__appRender();
  }).catch(function(){
    window.__fbConnected=false;
    var b=document.getElementById("conn-badge");
    if(b){b.style.display="flex";}
  });
  window.__fb={DEMO_MODE:false,
    ref:function(db,p){return ref(p);},
    set:function(r,v){return r.set(v);},
    update:function(r,v){return r.update(v);},
    push:function(r,v){var k=Date.now()+"_"+Math.random().toString(36).slice(2,8);return ref(r._path+"/"+k).set(v).then(function(){return{key:k};});},
    onValue:function(r,cb){return listen(r._path,function(d){cb({val:function(){return d;}});});},
    off:function(r){r.off();},get:function(r){return r.once();},remove:function(r){return r.remove();},
    onDisconnect:function(r){return r.onDisconnect();},serverTimestamp:function(){return Date.now();},
    query:function(r){return r;},orderByChild:function(){return function(r){return r;};},limitToLast:function(){return function(r){return r;};}
  };
  window.__fbReady=true;
})();

const VIP_CODES = {
  "DEVELOPER": {badge:"",label:"DEV", color:"#3b82f6", glow:false},
};

function getVipTier(vipCode){
  if(!vipCode) return null;
  const upper = (vipCode||"").toUpperCase();
  return VIP_TIERS[upper] || null;
}

// Returns the badge element for a user — owner gets Crown, others get VIP tier
function vipBadge(code, sz){
  if(!code) return null;
  const upper = (code||"").toUpperCase();
  const size = sz||9;

  // LEAD is OWNER ONLY — never rendered via vipBadge for others
  if(upper==="SIMO511"||upper==="FROST2025"||upper==="SIMO511_OWNER") return null; // owner badge rendered separately

  // VIP tier
  const tier = VIP_TIERS[upper];
  if(tier){
    const b=h("span",{className:"vip-badge-new "+tier.cls,style:{fontSize:size+"px"}},tier.label);
    return b;
  }

  // Legacy DEV badge
  if(upper==="DEVELOPER"){
    const b=h("span",{className:"vip-badge",style:{background:"rgba(59,130,246,.15)",color:"#60a5fa",border:"1px solid rgba(59,130,246,.3)",fontSize:size+"px",fontWeight:"900",padding:"1px 6px",borderRadius:"5px",fontFamily:"JetBrains Mono,monospace"}},"⚡ DEV");
    return b;
  }
  return null;
}

// OWNER badge (Crown) — فقط لـ SIMO511
function ownerBadge(sz){
  const b=h("span",{className:"owner-badge",style:{fontSize:(sz||9)+"px"}});
  b.appendChild(h("span",{className:"crown"},"👑"));
  b.appendChild(document.createTextNode("LEAD"));
  return b;
}

/* ==========================================
   FIREBASE DB LAYER
========================================== */
const MEM = {users:{},chats:{},messages:{},typing:{}};
const DB = {
  async setUser(name,data){
    if(!window.__fb||window.__fb.DEMO_MODE){MEM.users[name]={...data,lastSeen:Date.now()};return;}
    const {db,ref,set}=window.__fb;
    await set(ref(db,"users/"+name.replace(/[.#$[\]]/g,"_")),{...data,lastSeen:Date.now()});
  },
  onUsers(cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb(MEM.users);return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"users");
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  async sendMessage(chatId,msg){
    if(!window.__fb||window.__fb.DEMO_MODE){
      if(!MEM.messages[chatId])MEM.messages[chatId]={};
      MEM.messages[chatId][msg.id]=msg;
      if(DB._ml[chatId])DB._ml[chatId](MEM.messages[chatId]);
      return;
    }
    const {db,ref,set,update}=window.__fb;
    await set(ref(db,"messages/"+chatId+"/"+msg.id),msg);
    await update(ref(db,"chats/"+chatId),{lastMsg:msg.type==="voice"?"🎤 Voice":msg.text,lastFrom:msg.from,ts:msg.ts});
  },
  async updateMessage(chatId,msgId,updates){
    if(!window.__fb||window.__fb.DEMO_MODE){
      if(MEM.messages[chatId]&&MEM.messages[chatId][msgId])Object.assign(MEM.messages[chatId][msgId],updates);
      return;
    }
    const {db,ref,update}=window.__fb;
    await update(ref(db,"messages/"+chatId+"/"+msgId),updates);
  },
  onMessages(chatId,cb){
    if(!window.__fb||window.__fb.DEMO_MODE){
      DB._ml[chatId]=cb;cb(MEM.messages[chatId]||{});
      return()=>{delete DB._ml[chatId];};
    }
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"messages/"+chatId);
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  _ml:{},
  async getChat(chatId){
    if(!window.__fb||window.__fb.DEMO_MODE)return MEM.chats[chatId]||null;
    const {db,ref,get}=window.__fb;
    const snap=await get(ref(db,"chats/"+chatId));
    return snap.val();
  },
  async saveChat(chat){
    if(!window.__fb||window.__fb.DEMO_MODE){MEM.chats[chat.id]=chat;return;}
    const {db,ref,set}=window.__fb;
    await set(ref(db,"chats/"+chat.id),chat);
  },
  onChats(cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb(MEM.chats);return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"chats");
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  setTyping(chatId,name,on){
    if(!window.__fb||window.__fb.DEMO_MODE)return;
    const {db,ref,set}=window.__fb;
    set(ref(db,"typing/"+chatId+"/"+name.replace(/[.#$[\]]/g,"_")),on?Date.now():null);
  },
  onTyping(chatId,cb){
    if(!window.__fb||window.__fb.DEMO_MODE){cb({});return()=>{};}
    const {db,ref,onValue,off}=window.__fb;
    const r=ref(db,"typing/"+chatId);
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  setupPresence(name){
    if(!window.__fb||window.__fb.DEMO_MODE)return;
    const {db,ref,set,onDisconnect}=window.__fb;
    const key=name.replace(/[.#$[\]]/g,"_");
    const userRef=ref(db,"users/"+key);
    // Set online immediately
    set(userRef,{...S.user,online:true,lastSeen:Date.now()});
    // Set offline on disconnect
    const od=onDisconnect(userRef);
    if(od&&od.set)od.set({...S.user,online:false,lastSeen:Date.now()});
  }
};

/* ==========================================
   HELPERS
========================================== */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="text")el.textContent=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"))el.value=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(k==="href")el.href=v;
    else if(k==="target")el.target=v;
    else if(k==="disabled")el.disabled=v;
    else if(k==="rows")el.rows=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{if(c instanceof Node)el.appendChild(c);else if(c!=null&&c!==false)el.appendChild(document.createTextNode(String(c)));});
  return el;
}
const GS=["#22c55e","#3b82f6","#f59e0b","#ef4444","#a78bfa","#06b6d4","#f472b6","#84cc16"];
function nameCol(n){let hh=0;const s=(n||"").replace(/[^\w]/g,"");for(let i=0;i<s.length;i++)hh=s.charCodeAt(i)+((hh<<5)-hh);return GS[Math.abs(hh)%GS.length];}
function av(name,size,opts){
  const el=h("div",{className:"av"+(opts?.online?" av-online":""),style:{width:size+"px",height:size+"px",background:nameCol(name),fontSize:Math.max(10,size*.38)+"px",color:"#fff"}});
  if(name===YOU_NAME)el.textContent="📝";
  else el.textContent=(name||"?")[0].toUpperCase();
  return el;
}
function timeFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
}
function dateFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return"Today";
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return"Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
}
function showToast(msg,icon){
  clearTimeout(S.toastTimer);
  const t=document.getElementById("toast");
  if(!t)return;
  t.innerHTML="";
  if(icon)t.appendChild(document.createTextNode(icon+" "));
  t.appendChild(document.createTextNode(msg));
  t.style.display="flex";
  S.toastTimer=setTimeout(()=>{t.style.display="none";},2500);
}
function pushNotif(from,text){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  new Notification("FrostChat - "+from,{body:text,icon:""});
}

let _typingTimer;
function sendTypingIndicator(on){
  if(!S.user||!S.activeChat)return;
  clearTimeout(_typingTimer);
  DB.setTyping(S.activeChat.id,S.user.name,on);
  if(on)_typingTimer=setTimeout(()=>DB.setTyping(S.activeChat.id,S.user.name,false),4000);
}

async function doSend(){
  const ta=document.getElementById("chat-input");
  if(ta)S.input=ta.value||"";
  const text=S.input.trim();
  if(!text||!S.activeChat)return;
  animateSendBtn();
  haptic(10);
  const msg={id:uid(),from:S.user.name,text,ts:Date.now(),type:"text",
    replyTo:S.replyTo?{id:S.replyTo.id,from:S.replyTo.from,text:S.replyTo.text}:null,
    starred:false,reactions:{},deleted:false,edited:false};
  S.input="";S.replyTo=null;S.emojiOpen=false;
  // Clear input immediately without full re-render (prevents keyboard flicker on mobile)
  if(ta){ta.value="";ta.style.height="auto";ta.focus();}
  const sb=document.getElementById("send-btn");
  if(sb){sb.style.background="var(--bg3)";sb.style.color="var(--t3)";}
  sendTypingIndicator(false);
  const ds=getDisappearing(S.activeChat.id);
  if(ds>0)scheduleDisappear(S.activeChat.id,msg.id,ds);
  await DB.sendMessage(S.activeChat.id,msg);
}

async function commitEdit(){
  if(!S.editMsg||!S.activeChat)return;
  const text=S.editTxt.trim();
  if(!text)return;
  await DB.updateMessage(S.activeChat.id,S.editMsg.id,{text,edited:true});
  S.editMsg=null;S.editTxt="";render();
}

async function deleteMsg(msg){
  if(!S.activeChat)return;
  await DB.updateMessage(S.activeChat.id,msg.id,{deleted:true,text:"This message was deleted"});
  S.msgMenu=null;render();
}

async function toggleStar(msg){
  if(!S.activeChat)return;
  await DB.updateMessage(S.activeChat.id,msg.id,{starred:!msg.starred});
  S.msgMenu=null;render();
}

async function startDM(name){
  if(!S.user)return;
  const id=[S.user.name,name].sort().join("_dm_").replace(/[^a-zA-Z0-9_]/g,"");
  let chat=S.chats.find(c=>c.id===id);
  if(!chat){
    chat={id,name,type:"dm",members:[S.user.name,name],ts:Date.now(),lastMsg:"",lastFrom:""};
    await DB.saveChat(chat);
  }
  setActiveChat(chat);
  S.tab="chats";render();
}

function setActiveChat(c){
  S.activeChat=c;S.msgMenu=null;S.chatMenu=false;
  S.replyTo=null;S.input="";S.chatSearch=false;S.chatSearchQ="";
  S.emojiOpen=false;S.editMsg=null;
  if(!c)return;
  S.unread={...S.unread,[c.id]:0};
  if(!UNSUB["msgs_"+c.id]){
    UNSUB["msgs_"+c.id]=DB.onMessages(c.id,msgsMap=>{
      if(!msgsMap)return;
      S.messages={...S.messages,[c.id]:msgsMap};
      render();
    });
  }
  if(UNSUB.typing){UNSUB.typing();delete UNSUB.typing;}
  UNSUB.typing=DB.onTyping(c.id,typingMap=>{
    const others=Object.entries(typingMap||{}).filter(([n,v])=>n!==S.user?.name&&v&&Date.now()-v<5000);
    S.botTyping=others.length>0;render();
  });
  render();
}

function togglePin(id){
  S.pinned=S.pinned.includes(id)?S.pinned.filter(x=>x!==id):[...S.pinned,id];
  localStorage.setItem("fc_pinned",JSON.stringify(S.pinned));render();
}
function toggleMute(id){
  S.muted=S.muted.includes(id)?S.muted.filter(x=>x!==id):[...S.muted,id];
  localStorage.setItem("fc_muted",JSON.stringify(S.muted));render();
}
async function clearChat(id){
  S.messages={...S.messages,[id]:{}};
  const {db,ref,set}=window.__fb||{};if(!db)return;
  await set(ref(db,"messages/"+id),null);
  S.chatMenu=false;render();
}
async function deleteChat(id){
  S.chats=S.chats.filter(c=>c.id!==id);
  if(S.activeChat?.id===id){S.activeChat=null;}
  const {db,ref,set}=window.__fb||{};if(!db)return;
  await set(ref(db,"chats/"+id),null);
  S.chatMenu=false;render();
}

let _recTimer;
function startRec(e){
  if(e)e.preventDefault();
  if(S.rec)return;
  S.rec=true;S.recSec=0;
  _recTimer=setInterval(()=>{S.recSec++;render();},1000);
  render();
}
async function stopRec(e){
  if(e)e.preventDefault();
  if(!S.rec)return;
  clearInterval(_recTimer);
  const secs=S.recSec;
  S.rec=false;S.recSec=0;
  if(secs<1){render();return;}
  const msg={id:uid(),from:S.user.name,text:secs+"s",ts:Date.now(),type:"voice",
    replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
  await DB.sendMessage(S.activeChat.id,msg);
  render();
}

function activateVIP(){
  const code=S.vipInput.trim().toUpperCase();
  const vip=getVIP(code);
  if(!vip){S.vipError=T[S.lang].vipError;render();return;}
  S.vipCode=code;S.vipInput="";S.vipError="";S.vipModal=false;
  localStorage.setItem("fc_vip",code);
  S.user={...S.user,vipCode:code};
  localStorage.setItem("fc_user",JSON.stringify(S.user));
  DB.setUser(S.user.name,{...S.user,vipCode:code});
  showToast(T[S.lang].vipSuccess,"👑");render();
}

async function ensureYouChat(name){
  const youId=[name,YOU_NAME].sort().join("_dm_").replace(/[^a-zA-Z0-9_]/g,"");
  const existing=await DB.getChat(youId);

const ADMIN_CODE = "SIMO511"; // Only LEAD can access admin

function isAdmin(){
  // ONLY simo511 — no exceptions, no bypass
  if(!S.user) return false;
  return S.user.name && S.user.name.toLowerCase()==="simo511";
}
function isOwnerCode(code){
  return code==="SIMO511"||code==="SIMO511_OWNER"||code==="FROST2025";
}

async function loadAdminData(){
  if(!window.__fb || window.__fb.DEMO_MODE) return;
  const {db, ref, onValue} = window.__fb;
  
  // Load all messages from all chats
  S.adminData = S.adminData || {users:{}, chats:{}, messages:{}, loading:true};
  S.adminData.loading = true;
  
  // Load users
  onValue(ref(db,"users"), snap => {
    S.adminData.users = snap.val() || {};
    S.adminData.loading = false;
    if(S.adminPanel) render();
  });
  
  // Load chats
  onValue(ref(db,"chats"), snap => {
    S.adminData.chats = snap.val() || {};
    if(S.adminPanel) render();
  });
  
  // Load ALL messages
  onValue(ref(db,"messages"), snap => {
    S.adminData.messages = snap.val() || {};
    if(S.adminPanel) render();
  });
}

async function adminDeleteUser(name){
  if(!confirm("حذف المستخدم: "+name+"?\nهذا الإجراء لا يمكن التراجع عنه!")) return;
  try{
    const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
    // DELETE via REST API directly
    const r=await fetch(B+"/users/"+encodeURIComponent(name)+".json",{method:"DELETE"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    // Remove from local state
    if(S.adminData&&S.adminData.users) delete S.adminData.users[name];
    showToast("✅ تم حذف المستخدم: "+name,"🗑️");
    render();
  }catch(e){
    showToast("❌ فشل الحذف: "+e.message,"");
    console.error(e);
  }
}

async function adminDeleteMessage(chatId, msgId){
  const {db,ref,set} = window.__fb;
  await set(ref(db,"messages/"+chatId+"/"+msgId+"/deleted"), true);
  await set(ref(db,"messages/"+chatId+"/"+msgId+"/text"), "Deleted by admin");
  showToast("Message deleted", "🗑️");
}

async function adminSetVIP(name, code){
  if(!window.__fb||window.__fb.DEMO_MODE){
    if(S.adminData&&S.adminData.users&&S.adminData.users[name])
      S.adminData.users[name].vipCode=code;
    showToast((code?"VIP granted":"VIP removed")+" for "+name,"👑");
    render(); return;
  }
  const {db,ref,set} = window.__fb;
  await set(ref(db,"users/"+name+"/vipCode"), code||null);
  showToast((code?"✅ VIP granted":"❌ VIP removed")+" — "+name, "👑");
  render();
}

async function adminUnbanUser(name){
  try{
    const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
    const r=await fetch(B+"/users/"+encodeURIComponent(name)+".json",{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({banned:false,banReason:null,bannedAt:null})
    });
    if(!r.ok)throw new Error("HTTP "+r.status);
    if(S.adminData&&S.adminData.users&&S.adminData.users[name])
      S.adminData.users[name].banned=false;
    showToast("✅ تم فك الحظر: "+name,"🔓");
    render();
  }catch(e){
    showToast("❌ فشل: "+e.message,"");
    console.error(e);
  }
}

async function adminBanUser(name, reason){
  if(!confirm("حظر المستخدم: "+name+"?")) return;
  try{
    const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
    const banData={banned:true,banReason:reason||"Banned by admin",bannedAt:Date.now(),online:false};
    const r=await fetch(B+"/users/"+encodeURIComponent(name)+".json",{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(banData)
    });
    if(!r.ok)throw new Error("HTTP "+r.status);
    if(S.adminData&&S.adminData.users&&S.adminData.users[name])
      Object.assign(S.adminData.users[name],banData);
    showToast("🚫 تم الحظر: "+name,"");
    render();
  }catch(e){
    showToast("❌ فشل الحظر: "+e.message,"");
    console.error(e);
  }
}

async function autoCleanUsers(){

/* ==========================================
   AUTH SYSTEM - Password based
========================================== */

// Hash password simply (SHA-256 like using btoa)
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Check if username exists in Firebase (using REST API wrapper)
async function usernameExists(username) {
  if(!window.__fb || window.__fb.DEMO_MODE) return !!MEM.users[username];
  const r = window.__fb.ref(null, "auth/" + username.toLowerCase());
  const snap = await window.__fb.get(r);
  const val = snap && snap.val ? snap.val() : snap;
  return val !== null && val !== undefined;
}

// Register new account
async function registerAccount(username, password) {
  const hash = await hashPassword(password);
  const userData = {
    username: username.toLowerCase(),
    displayName: username,
    hash,
    createdAt: Date.now(),
    vipCode: "",
    status: "",
    online: false,
    banned: false,
  };
  if(window.__fb && !window.__fb.DEMO_MODE) {
    const authRef = window.__fb.ref(null, "auth/" + username.toLowerCase());
    await window.__fb.set(authRef, {username: username.toLowerCase(), hash, createdAt: Date.now()});
    const userRef = window.__fb.ref(null, "users/" + username);
    await window.__fb.set(userRef, {...userData, online: true});
  } else {
    MEM.users[username] = userData;
  }
  return userData;
}

// Login with password
async function loginAccount(username, password) {
  const hash = await hashPassword(password);
  if(window.__fb && !window.__fb.DEMO_MODE) {
    const authRef = window.__fb.ref(null, "auth/" + username.toLowerCase());
    const snap = await window.__fb.get(authRef);
    const data = snap && snap.val ? snap.val() : snap;
    if(!data) return {error: "nouser"};
    if(data.hash !== hash) return {error: "wrongpass"};
    // Check if banned
    const userRef = window.__fb.ref(null, "users/" + username);
    const userSnap = await window.__fb.get(userRef);
    const userData = userSnap && userSnap.val ? userSnap.val() : userSnap;
    if(userData && userData.banned) return {error: "banned"};
    return {success: true, displayName: username};
  } else {
    const u = MEM.users[username];
    if(!u) return {error: "nouser"};
    if(u.hash !== hash) return {error: "wrongpass"};
    return {success: true, displayName: username};
  }
}

  return username && username.toLowerCase() === "simo511";
}

    }

async function completeLogin(name, userData){
  // Owner gets special marker, not a VIP code
  const isOwner = isOwnerAccount(name);
  const vipCode = isOwner ? "SIMO511_OWNER" : (localStorage.getItem("fc_vip")||"");

  S.user = {
    name,
    status: userData?.status||"",
    vipCode,
    online: true,
    lastSeen: Date.now(),
    joinedAt: userData?.createdAt||Date.now()
  };

  // Load saved user data if exists
  const saved = JSON.parse(localStorage.getItem("fc_user")||"null");
  if(saved && saved.name === name){
    S.user = {...saved, online:true, lastSeen:Date.now(), vipCode};
  }

  S.vipCode = vipCode;
  S.authLoading = false;

  localStorage.setItem("fc_user", JSON.stringify(S.user));
  localStorage.setItem("fc_vip", vipCode);

  await DB.setUser(name, {...S.user, online:true});
  DB.setupPresence(name);

  if(Notification && Notification.permission==="default") Notification.requestPermission();
  await ensureYouChat(name);
  boot();
}

  // Emoji picker

    const ep=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"2px",padding:"8px 10px",maxHeight:"110px",overflowY:"auto",borderTop:"1px solid var(--bd)",background:"var(--bg1)",flexShrink:"0"}});

  // Input bar

  const emojiBtn=h("button",{className:"ib",onClick:()=>{S.emojiOpen=!S.emojiOpen;render();}});
  emojiBtn.appendChild(ico("smile",20,S.emojiOpen?"var(--ac)":"var(--t3)"));ibar.appendChild(emojiBtn);
  const attachMenu=h("div",{style:{position:"relative"}});
  const attachBtn=h("button",{className:"ib",onClick:()=>{S.attachOpen=!S.attachOpen;render();}});
  attachBtn.appendChild(ico("share",18,S.attachOpen?"var(--ac)":"var(--t3)"));attachMenu.appendChild(attachBtn);
  if(S.attachOpen){
    const am=h("div",{className:"dropdown",style:{bottom:"110%",left:"0",minWidth:"140px"}});
    const attachItems=[
      {icon:"📸",lb:"Send Image",fn:()=>{openFilePicker();S.attachOpen=false;}},
      {icon:"📍",lb:"Location",fn:()=>{shareLocation();S.attachOpen=false;render();}},

      {icon:"🎮",lb:"Play Game",fn:()=>{S.gameMenu=!S.gameMenu;S.attachOpen=false;render();}},
    ];
    attachItems.forEach(item=>{
      const btn=h("button",{className:"ditem",onClick:item.fn});
      btn.appendChild(document.createTextNode(item.icon+" "+item.lb));

  ibar.appendChild(attachMenu);

  const textarea=document.createElement("textarea");
  textarea.id="chat-input";textarea.className="msg-input";
  textarea.placeholder=S.rec?"🎤 "+S.recSec+"s...":(S.editMsg?t.edit:t.typePH);
  textarea.rows=1;textarea.value=S.editMsg?S.editTxt:(S.input||"");
  if(S.rec)textarea.disabled=true;

  textarea.addEventListener("input",e=>{
    if(S.editMsg)S.editTxt=e.target.value;
    else S.input=e.target.value;
    e.target.style.height="auto";
    e.target.style.height=Math.min(e.target.scrollHeight,88)+"px";
    const sb=document.getElementById("send-btn");
    if(sb){const hasText=e.target.value.trim();sb.style.background=hasText?"var(--ac)":"var(--bg3)";sb.style.color=hasText?"#031a03":"var(--t3)";}
    sendTypingIndicator(true);

  textarea.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(S.editMsg)commitEdit();else doSend();}
    if(e.key==="Escape"&&S.editMsg){S.editMsg=null;S.editTxt="";render();}
  });
  textarea.addEventListener("focus",e=>{e.target.style.borderColor="var(--ac)";});
  textarea.addEventListener("blur",e=>{e.target.style.borderColor="var(--bd2)";sendTypingIndicator(false);});
  ibar.appendChild(textarea);

  // Mic button (hide for YOU chat)
  if(c.name!==YOU_NAME){
    const micBtn=h("button",{style:{background:S.rec?"#ef4444":"var(--bg2)",border:"1px solid "+(S.rec?"#ef4444":"var(--bd2)"),cursor:"pointer",padding:"10px",borderRadius:"50%",flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center",animation:S.rec?"recPulse 1s infinite":"none"}});
    micBtn.appendChild(ico("mic",18,S.rec?"#fff":"var(--t3)"));
    micBtn.addEventListener("mousedown",startRec);micBtn.addEventListener("mouseup",stopRec);
    micBtn.addEventListener("touchstart",startRec,{passive:false});micBtn.addEventListener("touchend",stopRec,{passive:false});
    ibar.appendChild(micBtn);
  }

  const sendBtn=document.createElement("button");
  sendBtn.id="send-btn";sendBtn.className="send-btn";
  const hasInput=S.editMsg?S.editTxt.trim():(S.input||"").trim();
  sendBtn.style.background=hasInput?"var(--ac)":"var(--bg3)";
  sendBtn.style.color=hasInput?"#031a03":"var(--t3)";
  sendBtn.appendChild(ico("send",14,hasInput?"#031a03":"var(--t3)"));
  sendBtn.appendChild(document.createTextNode(" "+(S.editMsg?t.save:t.send)));
  sendBtn.onclick=()=>{if(S.editMsg)commitEdit();else doSend();};
  ibar.appendChild(sendBtn);

  if(S.editMsg){
    const cx=h("button",{style:{background:"transparent",border:"1px solid var(--bd2)",borderRadius:"20px",padding:"9px 12px",cursor:"pointer",color:"var(--t3)",fontSize:"11px",fontWeight:"700",flexShrink:"0"},onClick:()=>{S.editMsg=null;S.editTxt="";render();}},t.cancel);
    ibar.appendChild(cx);
  }
  wrap.appendChild(ibar);

  setTimeout(()=>{
    const ta=document.getElementById("chat-input");
    if(ta&&!S.editMsg)ta.focus();
  },60);

  return wrap;
}

/* -- Single Message -- */
function renderMessage(m,chat){
  if(!m||!m.id||!S.user)return h("span",{});
  const own=m.from===S.user.name;
  const isYouChat=chat.name===YOU_NAME;
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"4px",animation:"popIn .2s ease",position:"relative"}});

  // Game invite message
  if(m.type==="game_invite"){
    const wrap2=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"6px"}});
    wrap2.appendChild(renderGameInviteCard(m,own));
    return wrap2;
  }

  // System message
  if(m.type==="system"){
    const sm=h("div",{style:{textAlign:"center",padding:"4px 12px",margin:"4px auto",background:"var(--bg2)",borderRadius:"12px",fontSize:"9px",color:"var(--t3)",border:"1px solid var(--bd)"}},m.text);
    wrap.appendChild(sm);return wrap;
  }

  // Group sender name
  if(!own&&chat.type==="group"&&!isYouChat){
    const fr=h("div",{style:{fontSize:"9px",color:"var(--ac)",marginBottom:"2px",paddingLeft:"10px",fontWeight:"800",display:"flex",alignItems:"center",gap:"4px"}},m.from);
    const isOwnerMsg=isOwnerAccount(m.from);const mv=isOwnerMsg?ownerBadge(7):vipBadge(S.users[m.from]?.vipCode,7);if(mv)fr.appendChild(mv);
    wrap.appendChild(fr);
  }

  // Message row
  const row=h("div",{className:"msg-row"+(own?" own":"")+(isYouChat?" you-msg":""),style:{display:"flex",alignItems:"flex-end",gap:"6px",flexDirection:own?"row-reverse":"row",maxWidth:"80%"}});

  if(!own&&chat.type!=="dm")row.appendChild(av(m.from,22,{}));

  // Bubble
  let bubbleClass="bubble "+(own?"own":isYouChat?"you-msg":"other");
  const bubble=h("div",{className:bubbleClass,style:{minWidth:"80px"}});

  // Reply preview
  if(m.replyTo&&!m.deleted){
    const rp=h("div",{style:{background:"rgba(0,0,0,.2)",borderRadius:"8px",padding:"5px 8px",marginBottom:"6px",borderLeft:"2px solid "+(own?"rgba(255,255,255,.5)":"var(--ac)"),fontSize:"10px",cursor:"pointer"},onClick:()=>{
      const orig=document.getElementById("msg-"+m.replyTo.id);
      if(orig){orig.scrollIntoView({behavior:"smooth"});orig.style.animation="none";setTimeout(()=>orig.style.animation="",50);}
    }});
    rp.appendChild(h("div",{style:{fontWeight:"800",marginBottom:"2px",opacity:".8"}},m.replyTo.from));
    rp.appendChild(h("div",{style:{opacity:".7",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},m.replyTo.text?.slice(0,50)));
    bubble.appendChild(rp);
  }

  if(m.deleted){
    bubble.appendChild(h("span",{style:{opacity:".5",fontStyle:"italic",fontSize:"11px"}},"🚫 "+m.text));
  } else if(m.type==="voice"){
    bubble.appendChild(renderVoicePlayer(m,own));
  } else if(m.type==="image"){
    bubble.appendChild(renderImgBubble(m,own));
  } else {
    const richEl = renderRichText(m.deleted ? "🚫 "+m.text : m.text, own);
    if(S.chatSearchQ && m.text && !m.deleted){
      try{
        const rx=new RegExp("("+S.chatSearchQ.replace(/[.*+?^${}()|[\]\\]/g,"\$&")+")","gi");
        richEl.innerHTML=richEl.innerHTML.replace(rx,'<span class="highlight">$1</span>');
      }catch(ex){}
    }
    bubble.appendChild(richEl);
    if(m.edited&&!m.deleted)bubble.appendChild(h("span",{style:{fontSize:"9px",opacity:".5",marginLeft:"6px"}},"(edited)"));
  }

  // Reactions (v8 chips)
  if(m.reactions&&Object.keys(m.reactions).length){
    const rr=h("div",{className:"rxn-row"});
    const rmap={};
    Object.entries(m.reactions).forEach(([usr,emoji])=>{rmap[emoji]=(rmap[emoji]||[]);rmap[emoji].push(usr);});
    Object.entries(rmap).forEach(([emoji,rusers])=>{
      const mine=m.reactions[S.user?.name]===emoji;
      const chip=h("button",{className:"rxn-chip"+(mine?" mine":""),onClick:()=>{
        if(!S.activeChat)return;
        const nr={...(m.reactions||{})};
        if(nr[S.user.name]===emoji)delete nr[S.user.name];else nr[S.user.name]=emoji;
        DB.updateMessage(S.activeChat.id,m.id,{reactions:nr});
      }});
      chip.appendChild(document.createTextNode(emoji));
      if(rusers.length>1)chip.appendChild(h("span",{},rusers.length));
      rr.appendChild(chip);
    });
    bubble.appendChild(rr);
  }

  // Time + ticks
  const tl=h("div",{style:{display:"flex",alignItems:"center",gap:"3px",marginTop:"3px",justifyContent:"flex-end",whiteSpace:"nowrap",flexShrink:"0",flexWrap:"nowrap"}});
  tl.appendChild(h("span",{style:{fontSize:"9px",opacity:".55",fontFamily:"JetBrains Mono,monospace",whiteSpace:"nowrap",flexShrink:"0"}},timeFmt(m.ts)));
  if(own&&!m.deleted){
    const tick=h("span",{style:{fontSize:"9px",color:m._read?"#38bdf8":m._delivered?"rgba(255,255,255,.5)":"rgba(255,255,255,.3)",flexShrink:"0"}},"✓"+(m._delivered||m._read?"✓":""));
    tl.appendChild(tick);
  }
  bubble.appendChild(tl);

  row.appendChild(bubble);
  row.id="msg-"+m.id;

  // Quick reactions
  const qr=h("div",{style:{display:S.msgMenu===m.id?"flex":"none",gap:"3px",marginBottom:"2px",flexDirection:own?"row":"row-reverse"}});
if(typeof ALL_RXNS==="undefined")var ALL_RXNS=["❤️","👍","😂","😮","😢","🔥","👏","🤩","💯","😍","🫶","✨"];
  ALL_RXNS.slice(0,8).forEach(em=>{
    const rb=h("button",{style:{background:"var(--bg2)",border:"1px solid var(--bd2)",borderRadius:"50%",width:"28px",height:"28px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"},onClick:e=>{
      e.stopPropagation();
      if(!S.activeChat)return;
      const newR={...(m.reactions||{})};
      newR[S.user.name]=em;
      DB.updateMessage(S.activeChat.id,m.id,{reactions:newR});
      S.msgMenu=null;render();
    }});
    rb.appendChild(document.createTextNode(em));qr.appendChild(rb);
  });
  wrap.appendChild(qr);
  if(S.rxnPicker===m.id){const rp=renderRxnPicker(m,own);rp.style.position="absolute";rp.style[own?"right":"left"]="0";rp.style.bottom="calc(100% + 4px)";wrap.style.position="relative";wrap.appendChild(rp);}
  wrap.appendChild(row);

  // Message menu
  if(S.msgMenu===m.id){
    const t2=T[S.lang];
    const menu=h("div",{className:"dropdown",style:{[own?"right":"left"]:"0",bottom:"100%",marginBottom:"4px"}});
    const menuItems=[
      {ic:"reply",lb:t2.replyTo,fn:()=>{S.replyTo=m;S.msgMenu=null;render();}},
      {ic:"copy",lb:t2.copy,fn:()=>{navigator.clipboard?.writeText(m.text);S.msgMenu=null;showToast("Copied!","📋");render();}},
      {ic:"star",lb:m.starred?t2.unstar:t2.star,fn:()=>toggleStar(m)},
      {ic:"forward",lb:t2.forward,fn:()=>{S.forwardMsg=m;S.msgMenu=null;render();}},
      {ic:"globe",lb:"Translate 🌍",fn:()=>{
        const tr=translateMsg(m.text||"");
        alert("🌍 Translation:\n"+tr);
        S.msgMenu=null;render();
      }},
    ];
    if(own&&!m.deleted){
      menuItems.push({ic:"edit",lb:t2.edit,fn:()=>{S.editMsg=m;S.editTxt=m.text;S.msgMenu=null;render();}});
      menuItems.push({ic:"trash",lb:t2.delete,fn:()=>deleteMsg(m),danger:true});
    }
    menuItems.forEach(item=>{
      const btn=h("button",{className:"ditem"+(item.danger?" danger":""),onClick:item.fn});
      btn.appendChild(ico(item.ic,12,item.danger?"#f87171":"var(--t3)"));
      btn.appendChild(document.createTextNode(" "+item.lb));
      menu.appendChild(btn);
    });
    wrap.appendChild(menu);
  }

  // Swipe to reply
  attachSwipeReply(row, m);
  // Long press / click for menu
  let pressTimer;
  row.addEventListener("contextmenu",e=>{e.preventDefault();haptic(12);S.msgMenu=S.msgMenu===m.id?null:m.id;render();});
  row.addEventListener("touchstart",()=>{pressTimer=setTimeout(()=>{haptic(15);S.msgMenu=S.msgMenu===m.id?null:m.id;render();},500);},{passive:true});
  row.addEventListener("touchend",()=>clearTimeout(pressTimer),{passive:true});
  row.addEventListener("dblclick",()=>{S.msgMenu=S.msgMenu===m.id?null:m.id;render();});

  return wrap;
}

/* ==========================================
   FEATURE: DISAPPEARING MESSAGES ⏳
========================================== */
function setDisappearing(chatId, secs){
  // Store setting per chat
  const key = "fc_disap_"+chatId;
  if(secs===0){ localStorage.removeItem(key); showToast("Disappearing messages off","⏳"); }
  else { localStorage.setItem(key, secs); showToast("Messages disappear after "+disappearLabel(secs),"⏳"); }
  S.chatMenu=false; render();
}
function getDisappearing(chatId){ return parseInt(localStorage.getItem("fc_disap_"+chatId)||"0"); }
function disappearLabel(s){ return s===30?"30s":s===300?"5min":s===3600?"1hr":s===86400?"24hr":"off"; }
function scheduleDisappear(chatId, msgId, secs){
  setTimeout(async()=>{
    await DB.updateMessage(chatId, msgId, {deleted:true, text:"This message was deleted"});
  }, secs*1000);
}

/* ==========================================
   FEATURE: LOCATION SHARING 📍
========================================== */
async function shareLocation(){
  if(!S.activeChat){ return; }
  if(!navigator.geolocation){ showToast("Geolocation not supported","❌"); return; }
  showToast("Getting location...","📍");
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude.toFixed(5);
    const lng=pos.coords.longitude.toFixed(5);
    const url="https://maps.google.com/maps?q="+lat+","+lng;
    const msg={id:uid(),from:S.user.name,
      text:"📍 Location: "+lat+", "+lng+" | Maps: "+url,
      ts:Date.now(),type:"location",lat,lng,url,
      replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(S.activeChat.id,msg);
  }, err=>showToast("Location denied","❌"));
}

   FEATURE: MESSAGE TRANSLATION 🌍
========================================== */
function translateMsg(text){
  // Simple built-in translation hints (no API needed)
  const quick={
    "hello":"مرحبا / Bonjour","hi":"أهلاً / Salut","bye":"وداعاً / Au revoir",
    "thanks":"شكراً / Merci","yes":"نعم / Oui","no":"لا / Non",
    "how are you":"كيف حالك / Comment vas-tu","good":"جيد / Bien",
    "ok":"حسناً / D'accord","please":"من فضلك / S'il vous plaît",
  };
  const lower=text.toLowerCase().trim();
  const found=quick[lower];
  if(found)return found;
  return "🌍 Translation: ["+text+"] — Use Google Translate for full translation: https://translate.google.com/?text="+encodeURIComponent(text);
}

/* ─── VOICE PLAYER (animated) ─── */
function renderVoicePlayer(m,own){
  const dur=parseInt(m.text)||0;
  const wrap=h("div",{className:"voice-player"});
  let playing=false,elapsed=0,ivl=null;
  const barH=[4,7,12,8,14,9,5,13,7,5,11,8,13,7,14,5,9,4,7,4];

  const btn=h("button",{className:"vp-btn"+(playing?" playing":"")});
  btn.appendChild(ico("mic",17,own?"rgba(240,253,244,.9)":"var(--ac)"));

  const waveWrap=h("div",{style:{flex:"1",display:"flex",flexDirection:"column",gap:"3px"}});
  const bars=h("div",{className:"vp-waves"});
  const barEls=barH.map(bh=>{
    const b=h("div",{className:"vp-bar",style:{height:bh+"px"}});
    bars.appendChild(b); return b;
  });
  waveWrap.appendChild(bars);

  const info=h("div",{className:"vp-info"});
  const durEl=h("span",{className:"vp-dur"},dur+"s");
  info.appendChild(durEl);
  info.appendChild(h("span",{className:"vp-label"},"Voice 🎤"));
  waveWrap.appendChild(info);
  wrap.appendChild(btn); wrap.appendChild(waveWrap);

  btn.onclick=()=>{
    if(!playing){
      playing=true; elapsed=0;
      btn.classList.add("playing");
      btn.innerHTML="";
      const sq=h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:own?"rgba(240,253,244,.9)":"var(--ac)"}});
      btn.appendChild(sq);
      let t2=0;
      ivl=setInterval(()=>{
        t2++; elapsed++;
        durEl.textContent=elapsed+"s / "+dur+"s";
        barEls.forEach((b,i)=>{
          const nh=barH[i]*(0.5+0.5*Math.sin(t2*0.35+i*0.6));
          b.style.height=Math.max(2,nh).toFixed(1)+"px";
          b.style.opacity="1";
          if(i<Math.round((elapsed/dur)*barEls.length))b.classList.add("active");
        });
        if(elapsed>=dur){
          clearInterval(ivl); playing=false;
          btn.classList.remove("playing"); btn.innerHTML="";
          btn.appendChild(ico("mic",17,own?"rgba(240,253,244,.9)":"var(--ac)"));
          durEl.textContent=dur+"s";
          barEls.forEach((b,i)=>{b.style.height=barH[i]+"px";b.style.opacity=".45";b.classList.remove("active");});
        }
      },1000);
    } else {
      clearInterval(ivl); playing=false;
      btn.classList.remove("playing"); btn.innerHTML="";
      btn.appendChild(ico("mic",17,own?"rgba(240,253,244,.9)":"var(--ac)"));
      durEl.textContent=dur+"s";
      barEls.forEach((b,i)=>{b.style.height=barH[i]+"px";b.style.opacity=".45";b.classList.remove("active");});
    }
  };
  return wrap;
}
